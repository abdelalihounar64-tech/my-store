<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* header */
header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

button {
  border: none;
  padding: 10px;
  border-radius: 8px;
}

/* المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

/* السلة */
.cartBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: orange;
  color: white;
  font-size: 20px;
}

/* admin */
.adminPanel {
  position: fixed;
  top: 10%;
  left: 5%;
  width: 90%;
  background: white;
  padding: 15px;
  border-radius: 15px;
  display: none;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

</style>
</head>

<body>

<header>
  <h2>My Store 🛒</h2>
  <button onclick="openAdmin()">Admin</button>
</header>

<div class="products" id="products"></div>

<button class="cartBtn" onclick="goCart()">🛒</button>

<!-- admin -->
<div class="adminPanel" id="adminPanel">
  <h3>إضافة منتج</h3>

  <input id="name" placeholder="اسم المنتج">
  <input id="price" placeholder="الثمن">
  <input id="pieces" placeholder="عدد القطع">

  <input type="file" id="images" multiple>

  <button onclick="addProduct()" style="background:green;color:white">إضافة</button>
  <button onclick="deleteProduct()" style="background:red;color:white">حذف آخر منتج</button>
  <button onclick="closeAdmin()">إغلاق</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

function render(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  // ترتيب A-Z
  products.sort((a,b)=>a.name.localeCompare(b.name));

  products.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${p.images[0]}">
      <h3>${p.name}</h3>
      <p>${p.price} dh</p>

      <input type="number" id="qty${i}" value="1" min="1">

      <button onclick="addToCart(${i})">أضف للسلة</button>
      <button onclick="buyNow(${i})" style="background:green;color:white">واتساب</button>
    `;

    container.appendChild(div);
  });
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let pieces = document.getElementById("pieces").value;
  let files = document.getElementById("images").files;

  let images = [];

  let readerCount = 0;

  for(let i=0;i<files.length;i++){
    let reader = new FileReader();
    reader.onload = function(e){
      images.push(e.target.result);
      readerCount++;

      if(readerCount === files.length){
        products.push({name, price, pieces, images});
        saveProducts();
        render();
        alert("تمت الإضافة");
      }
    }
    reader.readAsDataURL(files[i]);
  }
}

function deleteProduct(){
  products.pop();
  saveProducts();
  render();
}

function addToCart(i){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let qty = document.getElementById("qty"+i).value;

  cart.push({...products[i], qty});
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة للسلة");
}

function buyNow(i){
  let qty = document.getElementById("qty"+i).value;
  let p = products[i];

  let msg = `أريد شراء:\n${p.name}\nالكمية: ${qty}\nالثمن: ${p.price}`;

  window.open(`https://wa.me/212613675970?text=${encodeURIComponent(msg)}`);
}

function goCart(){
  window.location.href="cart.html";
}

function openAdmin(){
  let code = prompt("دخل الكود");

  if(code=="1234"){
    document.getElementById("adminPanel").style.display="block";
  }else{
    alert("كود خاطئ");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

render();
</script>

</body>
</html>
