<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.cart{
  padding:15px;
}

.item{
  background:#fff;
  border-radius:15px;
  padding:15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.remove{
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:35px;
  height:35px;
  font-size:18px;
}

.total{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}

.order{
  width:90%;
  margin:20px auto;
  display:block;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<header>🛒 السلة</header>

<div class="cart" id="cart"></div>

<div class="total" id="total"></div>

<button class="order" onclick="order()">اطلب عبر واتساب</button>

<script>

let cart = [];

try{
  cart = JSON.parse(localStorage.getItem("cart")) || [];
}catch(e){
  cart = [];
}

let cartDiv = document.getElementById("cart");
let total = 0;

function renderCart(){
  cartDiv.innerHTML = "";
  total = 0;

  cart.forEach((item, index) => {

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <button class="remove" onclick="removeItem(${index})">❌</button>
      <div>
        <h3>${item.name}</h3>
        <p>الكمية: ${item.qty}</p>
        <p>الثمن: ${item.total} DH</p>
      </div>
    `;

    cartDiv.appendChild(div);

    total += item.total;
  });

  document.getElementById("total").innerText = "المجموع: " + total + " DH";
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function order(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  let msg = "السلام، بغيت نطلب:\n\n";

  cart.forEach(item => {
    msg += `${item.name}\n`;
    msg += `الكمية: ${item.qty}\n`;
    msg += `الثمن: ${item.total} DH\n\n`;
  });

  msg += `المجموع: ${total} DH`;

  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(msg));
}

renderCart();

</script>

</body>
</html>
