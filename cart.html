<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.item{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:10px;
  position:relative;
}

.delete{
  position:absolute;
  left:10px;
  top:10px;
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
}

.total{
  text-align:center;
  font-size:22px;
  margin:20px;
}

.order{
  width:90%;
  margin:20px auto;
  display:block;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 السلة</header>

<div id="cart"></div>

<div class="total" id="total"></div>

<button class="order" onclick="order()">اطلب عبر واتساب</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart");

let total = 0;

function loadCart(){
  container.innerHTML="";
  total=0;

  cart.forEach((item,index)=>{
    total += item.price;

    container.innerHTML += `
      <div class="item">
        <button class="delete" onclick="removeItem(${index})">X</button>
        <h3>${item.name}</h3>
        <p>الكمية: ${item.quantity}</p>
        <p>الثمن: DH ${item.price}</p>
      </div>
    `;
  });

  document.getElementById("total").innerText = "المجموع: DH " + total;
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function order(){
  let text="السلام، بغيت نطلب:\n";

  cart.forEach(item=>{
    text += item.name + " - " + item.quantity + "\n";
  });

  text += "المجموع: " + total + " DH";

  window.open("https://wa.me/212613675970?text="+encodeURIComponent(text));
}

loadCart();

</script>

</body>
</html>
