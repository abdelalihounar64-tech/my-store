<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

/* CART */
.container{
padding:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:10px;
margin:10px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.item img{
width:60px;
height:60px;
border-radius:10px;
object-fit:cover;
}

.info{
flex:1;
margin:0 10px;
}

.name{
font-weight:bold;
}

.qty{
color:#666;
font-size:14px;
}

.price{
font-weight:bold;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

.remove{
background:red;
color:white;
padding:8px;
border:none;
border-radius:8px;
}

.whatsapp{
background:green;
color:white;
}

.back{
background:#555;
color:white;
}

/* TOTAL */
.total{
font-size:18px;
font-weight:bold;
text-align:center;
margin-top:10px;
}

/* EMPTY */
.empty{
text-align:center;
margin-top:50px;
color:#777;
}

</style>
</head>

<body>

<header>السلة 🛒</header>

<div class="container">

<div id="cartItems"></div>

<div id="total" class="total"></div>

<button class="btn whatsapp" onclick="send()">اطلب عبر واتساب</button>
<button class="btn back" onclick="back()">رجوع للمتجر</button>

<div id="empty" class="empty" style="display:none;">
السلة فارغة
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// عرض السلة
function load(){

let html="";
let sum=0;

if(cart.length === 0){
document.getElementById("empty").style.display="block";
return;
}

cart.forEach((c,i)=>{

html+=`
<div class="item">

<img src="${c.img || 'https://via.placeholder.com/100'}">

<div class="info">
<div class="name">${c.name}</div>
<div class="qty">الكمية: ${c.qty}</div>
</div>

<div class="price">${c.price} DH</div>

<button class="remove" onclick="removeItem(${i})">❌</button>

</div>
`;

sum += c.price;
});

document.getElementById("cartItems").innerHTML = html;
document.getElementById("total").innerText = "المجموع: " + sum + " DH";

}

load();

// حذف
function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
load();
}

// واتساب
function send(){

if(cart.length === 0){
alert("السلة فارغة");
return;
}

let msg="السلام عليكم\nطلب:\n";

cart.forEach(c=>{
msg += c.name + " × " + c.qty + " = " + c.price + " DH\n";
});

window.open("https://wa.me/212613675970?text="+encodeURIComponent(msg));
}

// رجوع
function back(){
window.location="index.html";
}

</script>

</body>
</html>
