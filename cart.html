<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.item{
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
  display:flex;
  gap:10px;
}

.item img{
  width:70px;
  height:70px;
}

.del{
  background:red;
  color:#fff;
  border:none;
  width:30px;
  height:30px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>السلة 🛒</header>

<div id="cart"></div>

<h2 id="total" style="text-align:center"></h2>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function show(){

  let html="";
  let total=0;

  cart.forEach((p,i)=>{

    total += p.price;

    html+=`
    <div class="item">
      <img src="${p.image}">
      <div>
        <h3>${p.name}</h3>
        <p>DH ${p.price}</p>
      </div>
      <button class="del" onclick="del(${i})">X</button>
    </div>
    `;
  });

  document.getElementById("cart").innerHTML=html;
  document.getElementById("total").innerText="المجموع: DH "+total;
}

show();

function del(i){
  cart.splice(i,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  show();
}

</script>

</body>
</html>
