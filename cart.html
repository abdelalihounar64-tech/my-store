<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.item{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:10px;
  position:relative;
}

/* زر الحذف */
.delete{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  font-size:16px;
}

.total{
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin:15px;
}

.order{
  width:90%;
  margin:10px auto;
  display:block;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 السلة</header>

<div id="cart"></div>

<div class="total" id="total"></div>

<button class="order" onclick="sendOrder()">اطلب عبر واتساب</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

  let total = 0;
  let html = "";

  cart.forEach((item,index)=>{

    let price = item.qty * item.price;
    total += price;

    html += `
    <div class="item">
      <button class="delete" onclick="removeItem(${index})">❌</button>

      ${item.name}<br>
      الكمية: ${item.qty}<br>
      الثمن: ${price} DH
    </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = "المجموع: " + total + " DH";
}

/* حذف */
function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* واتساب */
function sendOrder(){

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  let total = 0;
  let msg = "السلام، هذا طلبي:\n";

  cart.forEach(item=>{
    let price = item.qty * item.price;
    total += price;

    msg += item.name + " - " + item.qty + " قطعة\n";
  });

  msg += "المجموع: " + total + " DH";

  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(msg));
}

/* أول تحميل */
renderCart();

</script>

</body>
</html>
