<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السلة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.cart-card{
background:white;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
display:flex;
gap:15px;
align-items:center;
}

.cart-card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
}

.product-info{
flex:1;
}

.product-name{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.row{
margin:4px 0;
font-size:16px;
}

.delete-btn{
padding:10px 15px;
border:none;
background:#dc3545;
color:white;
border-radius:10px;
cursor:pointer;
}

.summary{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.total{
font-size:26px;
font-weight:bold;
margin-bottom:15px;
}

.whatsapp-btn{
width:100%;
padding:18px;
border:none;
background:#25D366;
color:white;
font-size:22px;
border-radius:15px;
cursor:pointer;
}

.empty{
text-align:center;
font-size:22px;
margin-top:50px;
}

</style>
</head>

<body>

<h1>🛒 السلة</h1>

<div id="cartContainer"></div>

<script>

let cartItems =
JSON.parse(
localStorage.getItem("cartItems")
) || [];

const container =
document.getElementById(
"cartContainer"
);

renderCart();

function renderCart(){

if(cartItems.length === 0){

container.innerHTML =
'<div class="empty">السلة فارغة</div>';

return;

}

let total = 0;
let html = "";

cartItems.forEach((item,index)=>{

const itemTotal =
(item.price || 0)
*
(item.quantity || 0);

total += itemTotal;

let sangoDetails = "";

if(item.name === "Sango" && item.details){

if(item.details.scents){

sangoDetails +=
'<div class="row"><b>الاختيارات:</b></div>';

for(let scent in item.details.scents){

if(item.details.scents[scent] > 0){

sangoDetails +=
`<div class="row">
${scent}: ${item.details.scents[scent]} قطعة
</div>`;

}

}

}

if(item.details.gifts){

sangoDetails +=
'<div class="row"><b>🎁 الهدايا:</b></div>';

for(let gift in item.details.gifts){

if(item.details.gifts[gift] > 0){

sangoDetails +=
`<div class="row">
${gift}: ${item.details.gifts[gift]} قطعة
</div>`;

}

}

}

}

html += `

<div class="cart-card">

<img src="${item.image}">

<div class="product-info">

<div class="product-name">
${item.name}
</div>

<div class="row">
النوع:
${item.unit}
</div>

<div class="row">
الثمن:
${item.price || 0} درهم
</div>

${sangoDetails}

<div class="row">
الكمية:
${item.quantity}
</div>

<div class="row">
المجموع:
${itemTotal} درهم
</div>

</div>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

حذف

</button>

</div>

`;

});

html += `

<div class="summary">

<div class="total">

الإجمالي:
${total} درهم

</div>

<button
class="whatsapp-btn"
onclick="orderWhatsapp()">

إتمام الطلب عبر واتساب

</button>

</div>

`;

container.innerHTML = html;

}

function deleteProduct(index){

cartItems.splice(index,1);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

renderCart();

}

function orderWhatsapp(){

let message =
"مرحباً مصطفى،%0A%0Aأريد طلب:%0A%0A";

let total = 0;

cartItems.forEach(item=>{

const itemTotal =
(item.price || 0)
*
(item.quantity || 0);

total += itemTotal;

message +=
"- " + item.name + "%0A" +
"النوع: " + item.unit + "%0A" +
"الثمن: " + (item.price || 0) + " درهم%0A" +
"الكمية: " + item.quantity + "%0A";

if(item.name === "Sango" && item.details){

message += "%0Aالاختيارات:%0A";

for(let scent in item.details.scents){

if(item.details.scents[scent] > 0){

message +=
scent +
": " +
item.details.scents[scent] +
" قطعة%0A";

}

}

message += "%0Aالهدايا:%0A";

for(let gift in item.details.gifts){

if(item.details.gifts[gift] > 0){

message +=
gift +
": " +
item.details.gifts[gift] +
" قطعة%0A";

}

}

}

message += "%0A";

});

message +=
"%0Aالإجمالي: " +
total +
" درهم";

window.open(
"https://wa.me/212613675970?text=" +
message
);

}

</script>

</body>
</html>
