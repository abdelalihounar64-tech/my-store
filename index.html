<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

.btn {
  background: orange;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  color: white;
}

.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
}
</style>

</head>
<body>

<header>
<h2>My Store 🛒</h2>
<button onclick="admin()">Admin</button>
</header>

<div class="container" id="products"></div>

<button class="cart" onclick="goCart()">🛒</button>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

products.sort((a,b)=>a.name.localeCompare(b.name));

let container = document.getElementById("products");

products.forEach((p,i)=>{
  let div = document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${p.images[0]}" onclick="openProduct(${i})">
    <h3>${p.name}</h3>
    <button class="btn" onclick="add(${i})">أضف للسلة</button>
  `;

  container.appendChild(div);
});

function add(i){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(products[i]);
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("تمت الإضافة");
}

function openProduct(i){
  localStorage.setItem("productIndex",i);
  location="product.html";
}

function goCart(){
  location="cart.html";
}

function admin(){
  let p = prompt("الكود");
  if(p=="1234"){
    location="admin.html";
  }
}
</script>

</body>
</html>
