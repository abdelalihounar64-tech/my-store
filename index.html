<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h2{
  margin:0;
}

/* MENU */
.menu{
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  padding-top: 60px;
  transition: 0.3s;
  z-index: 999;
}

.menu a{
  display: block;
  padding: 15px;
  text-decoration: none;
  color: black;
  border-bottom: 1px solid #eee;
}

.menu a:hover{
  background:#f5f5f5;
}

/* HERO */
.hero{
  position:relative;
  height:220px;
  background:url('https://images.unsplash.com/photo-1581578731548-c64695cc6952') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero button{
  padding:12px 25px;
  border-radius:25px;
  border:2px solid white;
  background:transparent;
  color:white;
  font-size:16px;
}

/* PRODUCTS */
.section{
  padding:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}
</style>

</head>

<body>

<header>
  <span onclick="toggleMenu()">☰</span>
  <h2>My Store</h2>
  <span>🛒</span>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="index.html">Home</a>
  <a href="#">Products</a>
  <a href="#" onclick="openAdmin()">Admin</a>
  <a href="#">Contact</a>
  <a href="#">Catalog</a>
</div>
<!-- ADMIN PANEL -->
<div id="adminPanel" style="
display:none;
position:fixed;
top:20%;
left:10%;
width:80%;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
z-index:1000;
">

<h3>لوحة التحكم</h3>

<input id="productName" placeholder="اسم المنتج"><br><br>
<input id="productPrice" placeholder="الثمن"><br><br>

<button onclick="addProduct()" style="background:green;color:white">إضافة</button>
<button onclick="closeAdmin()" style="background:red;color:white">إغلاق</button>

</div>
<!-- HERO -->
<div class="hero">
  <button>تصفح المنتجات</button>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Products</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1584473457493-17c6d4b5f1d7">
      <h3>منظف أرضيات</h3>
      <p>20 dh</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604335399105-a0c585fd81a1">
      <h3>سائل غسيل</h3>
      <p>15 dh</p>
    </div>

  </div>

</div>

  <!-- ADMIN PANEL -->
<div id="adminPanel" style="
display:none;
position:fixed;
top:10%;
left:5%;
width:90%;
background:white;
padding:15px;
border-radius:15px;
z-index:1000;
">

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">

<input type="file" id="image">

<br><br>

<button onclick="addProduct()" style="background:green;color:white">إضافة</button>
<button onclick="deleteProduct()" style="background:red;color:white">حذف آخر منتج</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>
  
<script>

function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-250px" : "0px";
}

function openAdmin(){
  let code = prompt("دخل الكود");

  if(code === "36427239"){
    document.getElementById("adminPanel").style.display = "block";
  }else{
    alert("كود خاطئ ❌");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display = "none";
}

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

// حفظ
function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

// عرض
function render(){
  let container = document.querySelector(".products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>${p.price} dh</p>
    `;

    container.appendChild(div);
  });
}

// إضافة
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("image").files[0];

  if(!name || !price || !file){
    alert("عمر جميع الخانات");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    let image = e.target.result;

    products.push({name, price, image});
    saveProducts();
    render();

    alert("تمت الإضافة ✅");
  }

  reader.readAsDataURL(file);
}

// حذف آخر منتج
function deleteProduct(){
  products.pop();
  saveProducts();
  render();
}

// أول تشغيل
render();

</script>

</body>
</html>
