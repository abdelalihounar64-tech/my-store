<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.product{
  margin:15px;
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 My Store</header>

<div class="products" id="products"></div>

<script>

let products = [

{
  name:"balai IP harcha",
  price:10.25,
  description:"منتج عالي الجودة للتنظيف",
  pieces:16,
  images:[
    "https://i.ibb.co/VWG6NSVD/1777726032086.png",
    "https://i.ibb.co/zWcrwtGZ/file-000000007b1c7246a9c52dbdf91a5119.png"
  ]
},

{
  name:"Nova kh",
  price:36.5,
  description:"حفاضات العجزة الغنية عن التعريف",
  pieces:4,
  images:[
    "https://i.ibb.co/qLwx7Pyp/file-000000004c74724394121c6f1dbce3b5.png",
    "https://i.ibb.co/tTFF2gPM/Screenshot-2026-05-03-12-29-29-195-edit-com-miui-gallery.jpg"
  ]
}

];

localStorage.setItem("products", JSON.stringify(products));

function loadProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,index)=>{
    container.innerHTML += `
      <div class="product" onclick="openProduct(${index})">
        <img src="${p.images[0]}">
        <h2>${p.name}</h2>
      </div>
    `;
  });
}

function openProduct(i){
  localStorage.setItem("selectedProduct", i);
  window.location.href = "product.html";
}

loadProducts();

</script>

</body>
</html>
