<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{font-family:Arial;background:#eee;margin:0;}

.container{
padding:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

.save{background:green;color:white;}
.close{background:red;color:white;}

</style>
</head>

<body>

<div class="container">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="box" placeholder="عدد القطع في العلبة">
<input id="image" type="file">

<button class="save" onclick="saveProduct()">حفظ</button>
<button class="close" onclick="back()">رجوع</button>

</div>

<script>

function back(){
window.location="index.html";
}

function saveProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let box = document.getElementById("box").value;
let file = document.getElementById("image").files[0];

if(!name || !file){
alert("دخل الاسم والصورة");
return;
}

// تحويل الصورة
let reader = new FileReader();

reader.onload = function(e){

let imgBase64 = e.target.result;

let products = JSON.parse(localStorage.getItem("products")) || [];

products.push({
id: Date.now(),
name: name,
price: price,
box: box,
img: imgBase64
});

localStorage.setItem("products", JSON.stringify(products));

alert("تم الحفظ ✅");
window.location="index.html";

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
