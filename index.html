<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.admin-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:red;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:8px;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.product{
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.product img{
  width:100%;
  border-radius:10px;
}

.product button{
  margin:5px;
  padding:5px 10px;
  border:none;
  border-radius:8px;
}

.edit{background:orange;color:#fff;}
.delete{background:red;color:#fff;}
</style>
</head>

<body>

<header>🛒 My Store</header>

<button class="admin-btn" onclick="loginAdmin()">Admin</button>

<div class="products" id="products"></div>

<script>

// ================== تحميل المنتجات ==================
let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name:"balai IP harcha",
    price:10.25,
    img:"https://i.ibb.co/VWG6NSVD/1777726032086.png"
  },
  {
    name:"Nova kh",
    price:36.5,
    img:"https://i.ibb.co/qLwx7Pyp/file-000000004c74724394121c6f1dbce3b5.png"
  }
];

// ================== ترتيب A-Z ==================
products.sort((a,b)=>a.name.localeCompare(b.name));

// ================== عرض المنتجات ==================
let container = document.getElementById("products");
let isAdmin = localStorage.getItem("admin") === "true";

function display(){
  container.innerHTML = "";

  products.forEach((p,i)=>{

    let adminBtns = "";

    if(isAdmin){
      adminBtns = `
        <button class="edit" onclick="editProduct(${i})">✏️</button>
        <button class="delete" onclick="deleteProduct(${i})">❌</button>
      `;
    }

    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} DH</p>
        ${adminBtns}
      </div>
    `;
  });
}

display();

// ================== ADMIN LOGIN ==================
function loginAdmin(){
  let pass = prompt("دخل الباسورد");

  if(pass === "123@123"){
    localStorage.setItem("admin","true");
    alert("مرحبا Admin");
    location.reload();
  }else{
    alert("خطأ");
  }
}

// ================== حذف ==================
function deleteProduct(i){
  if(confirm("حذف المنتج؟")){
    products.splice(i,1);
    save();
  }
}

// ================== تعديل ==================
function editProduct(i){
  let name = prompt("اسم جديد", products[i].name);
  let price = prompt("ثمن جديد", products[i].price);

  if(name){
    products[i].name = name;
    products[i].price = price;
  }

  save();
}

// ================== حفظ ==================
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  location.reload();
}

</script>

</body>
</html>
