<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h2{margin:0}

/* MENU */
.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.2);
  transition:0.3s;
  padding-top:60px;
}

.menu a{
  display:block;
  padding:15px;
  border-bottom:1px solid #eee;
  text-decoration:none;
  color:black;
}

/* HERO */
.hero{
  height:220px;
  background:url("https://images.unsplash.com/photo-1581578731548-c64695cc6952") center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hero button{
  padding:15px 25px;
  border-radius:30px;
  border:2px solid white;
  background:transparent;
  color:white;
  font-size:16px;
}

/* PRODUCTS */
.section{
  padding:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}

/* ADMIN */
.adminPanel{
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  padding:15px;
  border-radius:15px;
  display:none;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  border:none;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <span onclick="toggleMenu()">☰</span>
  <h2>My Store</h2>
  <span>🛒</span>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#" onclick="openAdmin()">Admin</a>
  <a href="#">Contact</a>
  <a href="#">Catalog</a>
</div>

<!-- HERO -->
<div class="hero">
  <button onclick="scrollProducts()">تصفح المنتجات</button>
</div>

<!-- PRODUCTS -->
<div class="section" id="productsSection">
  <h2>Products</h2>

  <div class="products" id="products"></div>
</div>

<!-- ADMIN PANEL -->
<div class="adminPanel" id="adminPanel">
  <h3>إضافة منتج</h3>

  <input id="name" placeholder="اسم المنتج">
  <input id="price" placeholder="الثمن">
  <input id="pieces" placeholder="عدد القطع">

  <input type="file" id="images" multiple>

  <button onclick="addProduct()" style="background:green;color:white">إضافة</button>
  <button onclick="deleteProduct()" style="background:red;color:white">حذف آخر منتج</button>
  <button onclick="closeAdmin()">إغلاق</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

/* MENU */
function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.left = (m.style.left === "0px") ? "-250px" : "0px";
}

/* ADMIN */
function openAdmin(){
  let code = prompt("دخل الكود");

  if(code == "1234"){
    document.getElementById("adminPanel").style.display = "block";
  }else{
    alert("كود خاطئ");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display = "none";
}

/* SAVE */
function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

/* RENDER */
function render(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card" onclick="goProduct(${i})">
        <img src="${p.images[0]}">
        <h3>${p.name}</h3>
        <p>${p.price} dh</p>
      </div>
    `;
  });
}

/* ADD */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let pieces = document.getElementById("pieces").value;
  let files = document.getElementById("images").files;

  let images = [];
  let count = 0;

  for(let i=0;i<files.length;i++){
    let reader = new FileReader();

    reader.onload = function(e){
      images.push(e.target.result);
      count++;

      if(count === files.length){
        products.push({name, price, pieces, images});
        saveProducts();
        render();
        alert("تمت الإضافة");
      }
    }

    reader.readAsDataURL(files[i]);
  }
}

/* DELETE */
function deleteProduct(){
  products.pop();
  saveProducts();
  render();
}

/* GO PRODUCT */
function goProduct(i){
  localStorage.setItem("selectedProduct", JSON.stringify(products[i]));
  window.location.href = "product.html";
}

/* SCROLL */
function scrollProducts(){
  document.getElementById("productsSection").scrollIntoView({behavior:"smooth"});
}

render();

</script>

</body>
</html>
