<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header span{
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.2);
  transition:0.3s;
  z-index:1000;
}

.menu a{
  display:block;
  padding:15px;
  border-bottom:1px solid #eee;
  text-decoration:none;
  color:black;
}

/* HERO */
.hero{
  height:200px;
  background:url("https://images.unsplash.com/photo-1581578731548-c64695cc6952") center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero button{
  padding:10px 20px;
  border-radius:20px;
  border:2px solid white;
  background:transparent;
  color:white;
}

/* PRODUCTS */
.section{
  padding:15px;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}

/* ADMIN */
#adminPanel{
  display:none;
  position:fixed;
  top:10%;
  left:5%;
  width:90%;
  background:white;
  padding:15px;
  border-radius:15px;
  z-index:2000;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>
  <span onclick="toggleMenu()">☰</span>
  <h2>My Store</h2>
  <span>🛒</span>
</header>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="index.html">Home</a>
  <a href="#">Products</a>
  <a href="#" onclick="openAdmin()">Admin</a>
  <a href="#">Contact</a>
  <a href="#">Catalog</a>
</div>

<!-- HERO -->
<div class="hero">
  <button>تصفح المنتجات</button>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Products</h2>

  <div class="products"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="pieces" placeholder="عدد القطع في العلبة">

<input type="file" id="images" multiple>

<br>

<button onclick="addProduct()" style="background:green;color:white">إضافة</button>
<button onclick="deleteProduct()" style="background:red;color:white">حذف آخر منتج</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

/* MENU */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = menu.style.left === "0px" ? "-250px" : "0px";
}

/* ADMIN */
function openAdmin(){
  let code = prompt("دخل الكود");

  if(code === "36427239"){
    document.getElementById("adminPanel").style.display = "block";
  }else{
    alert("كود خاطئ ❌");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display = "none";
}

/* STORAGE */
function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

/* RENDER */
function render(){
  let container = document.querySelector(".products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.images[0]}">
      <h3>${p.name}</h3>
      <p>${p.price} dh</p>
      <small>العلبة: ${p.pieces}</small>
    `;

    container.appendChild(div);
  });
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let pieces = document.getElementById("pieces").value;
  let files = document.getElementById("images").files;

  if(!name || !price || files.length === 0){
    alert("عمر جميع الخانات");
    return;
  }

  if(files.length > 8){
    alert("يمكنك إدخال حتى 8 صور فقط");
    return;
  }

  let images = [];
  let loaded = 0;

  for(let i=0;i<files.length;i++){
    let reader = new FileReader();

    reader.onload = function(e){
      images.push(e.target.result);
      loaded++;

      if(loaded === files.length){
        products.push({name, price, pieces, images});
        saveProducts();
        render();
        alert("تمت الإضافة ✅");
      }
    }

    reader.readAsDataURL(files[i]);
  }
}

/* DELETE */
function deleteProduct(){
  products.pop();
  saveProducts();
  render();
}

/* START */
render();

</script>

</body>
</html>
