<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  position:relative;
}

.admin-btn{
  position:absolute;
  left:10px;
  top:10px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  position:relative;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.del{
  position:absolute;
  bottom:10px;
  left:10px;
  background:red;
  color:#fff;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
}

.add{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff9800;
  color:#fff;
  font-size:30px;
  border:none;
}

.box{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0008;
  justify-content:center;
  align-items:center;
}

.box div{
  background:#fff;
  padding:20px;
  width:90%;
}
</style>
</head>

<body>

<header>
My Store 🛒
<button class="admin-btn" onclick="login()">Admin</button>
</header>

<div class="grid" id="products"></div>

<button class="add" onclick="openAdd()">+</button>

<!-- إضافة -->
<div class="box" id="box">
<div>

<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم"><br><br>
<input id="price" placeholder="الثمن"><br><br>
<input id="desc" placeholder="الوصف"><br><br>
<input id="boxCount" placeholder="عدد القطع في العلبة"><br><br>

<input id="img1" placeholder="رابط صورة 1"><br>
<input id="img2" placeholder="رابط صورة 2"><br>
<input id="img3" placeholder="رابط صورة 3"><br>
<input id="img4" placeholder="رابط صورة 4"><br><br>

<button onclick="save()">حفظ</button>
<button onclick="closeAdd()">إغلاق</button>

</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let admin = false;

function show(){

  let html="";

  products.forEach((p,i)=>{

    html+=`
    <div class="card">

      <img src="${p.images[0] || ''}" onclick="openProduct(${i})">

      <h3>${p.name}</h3>
      <p>DH ${p.price || 0}</p>

      ${admin ? `<button class="del" onclick="del(${i})">X</button>` : ""}

    </div>
    `;
  });

  products.sort((a,b)=>a.name.localeCompare(b.name));

  document.getElementById("products").innerHTML = html;
}

show();

function openProduct(i){
  localStorage.setItem("selectedProduct", JSON.stringify(products[i]));
  location.href="product.html";
}

function openAdd(){
  if(!admin){ alert("خاصك تدخل Admin"); return;}
  box.style.display="flex";
}

function closeAdd(){
  box.style.display="none";
}

function save(){

  let newP={
    name:name.value,
    price:price.value,
    desc:desc.value,
    box:parseInt(boxCount.value) || 1,
    images:[
      img1.value,
      img2.value,
      img3.value,
      img4.value
    ].filter(i=>i!="")
  };

  products.push(newP);

  localStorage.setItem("products",JSON.stringify(products));

  location.reload();
}

function del(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  show();
}

function login(){
  let pass = prompt("دخل كلمة السر");
  if(pass=="123@123"){
    admin=true;
    alert("Admin مفعل");
    show();
  }
}

</script>

</body>
</html>
