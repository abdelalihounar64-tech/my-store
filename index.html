<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>My Store</title>

<style>
body{font-family:Arial; background:#f2f2f2;}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.btn{
background:orange;
color:white;
padding:10px;
border:none;
border-radius:10px;
width:100%;
}
</style>
</head>

<body>

<h2 style="text-align:center;">My Store 🛒</h2>

<div class="grid" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let html="";

products.forEach(p=>{
  html+=`
  <div class="card">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <button class="btn" onclick="buy('${p.name}')">اطلب</button>
  </div>
  `;
});

document.getElementById("products").innerHTML=html;

function buy(name){
  let msg="بغيت نشري: "+name;
  window.open("https://wa.me/212XXXXXXXXX?text="+msg);
}

</script>

</body>
</html>
