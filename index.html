<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.product{
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* زر + */
.addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:green;
  color:#fff;
  font-size:30px;
  border:none;
}

/* الفورم */
.form{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  padding:15px;
  display:none;
}

.form input{
  width:100%;
  margin:5px 0;
  padding:10px;
}
</style>
</head>

<body>

<header>🛒 My Store</header>

<div class="products" id="products"></div>

<button class="addBtn" onclick="openForm()">+</button>

<div class="form" id="form">
  <input id="name" placeholder="اسم المنتج">
  <input id="price" placeholder="الثمن">
  <input id="box" placeholder="عدد القطع فالعلبة">
  <input id="img" placeholder="رابط الصورة">
  <button onclick="addProduct()">حفظ</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function render(){

  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,index)=>{

    container.innerHTML += `
    <div class="product" onclick="openProduct(${index})">
      <img src="${p.img}">
      <h3>${p.name}</h3>
    </div>
    `;
  });
}

function openForm(){
  document.getElementById("form").style.display = "block";
}

function addProduct(){

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let box = document.getElementById("box").value;
  let img = document.getElementById("img").value;

  products.push({name,price,box,img});

  localStorage.setItem("products", JSON.stringify(products));

  render();

  document.getElementById("form").style.display = "none";
}

function openProduct(index){

  let p = products[index];

  let url = `product.html?name=${p.name}&price=${p.price}&box=${p.box}&img1=${p.img}`;

  window.location.href = url;
}

render();

</script>

</body>
</html>
