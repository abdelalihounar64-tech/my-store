<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

.product{
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  border-radius:10px;
}

.product h2{
  margin:10px 0;
}
</style>
</head>

<body>

<header>My Store 🛒</header>

<div class="products">

  <div class="product" onclick="openProduct('asperox')">
    <img src="https://i.imgur.com/8zQZ7ZR.jpg">
    <h2>Asperox</h2>
  </div>

  <div class="product" onclick="openProduct('aluminium')">
    <img src="https://i.imgur.com/ZK7y9Fh.jpg">
    <h2>Aluminium</h2>
  </div>

</div>

<script>
function openProduct(name){
  window.location.href = "product.html?name=" + name;
}
</script>

</body>
</html>
