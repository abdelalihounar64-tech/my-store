<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

.header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
}

.card h3{
  text-align:center;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">🛒 My Store</div>

<div class="products">

<div class="card" onclick="openProduct('asperox')">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<h3>Asperox</h3>
</div>

<div class="card" onclick="openProduct('aluminium')">
<img src="https://i.imgur.com/2nCt3Sbl.jpg">
<h3>Aluminium</h3>
</div>

<div class="card" onclick="openProduct('dettol')">
<img src="https://i.imgur.com/zYIlgBl.jpg">
<h3>Dettol</h3>
</div>

</div>

<script>
function openProduct(name){
  window.location.href = "product.html?product=" + name;
}
</script>

</body>
</html>
