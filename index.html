<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOSTAFA CLEAN SHOP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */

header{
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

.menu{
font-size:28px;
cursor:pointer;
}

.logo{
font-size:18px;
font-weight:bold;
}

.icons{
display:flex;
gap:20px;
font-size:24px;
}

/* HERO */

.hero{
height:500px;
background:url('https://i.ibb.co/qYL5PBx6/Screenshot-2026-05-29-14-28-04-640-edit-com-miui-gallery.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
}

.hero-content{
position:relative;
z-index:2;
}

.shop-btn{
padding:15px 40px;
border:2px solid white;
border-radius:50px;
color:white;
text-decoration:none;
font-size:22px;
backdrop-filter:blur(4px);
}

/* PRODUCTS */

.section{
padding:25px 15px;
}

.section h2{
font-size:35px;
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.product-link{
text-decoration:none;
color:inherit;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.card h3{
font-size:16px;
text-align:center;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="menu">☰</div>

<div class="logo">
MOSTAFA CLEAN SHOP
</div>

<div class="icons">
🔍
🛒
</div>

</header>

<section class="hero">

<div class="hero-content">
<a href="products.html" class="shop-btn">
Shop All
</a>
</div>

</section>

<section class="section">

<h2>Produits</h2>

<div class="products">

<a href="product.html" class="product-link">

<div class="card">

<img
src="https://i.ibb.co/Qjz9xgdQ/1779799104968.png"
alt="Asperox">

<div class="card-body">
<h3>Asperox Magic Yellow</h3>
</div>

</div>

</a>

</div>

</section>

<footer>
© 2026 MOSTAFA CLEAN SHOP
</footer>

</body>
</html>
