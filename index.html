<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostafa Clean Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
}

.icons{
display:flex;
gap:20px;
font-size:22px;
}

.hero{
height:500px;
background:url('https://i.ibb.co/qYL5PBx6/Screenshot-2026-05-29-14-28-04-640-edit-com-miui-gallery.jpg') center center/cover;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.35);
}

.hero-content{
position:relative;
text-align:center;
color:white;
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:15px 35px;
border:2px solid white;
color:white;
text-decoration:none;
border-radius:40px;
font-size:18px;
transition:.3s;
}

.btn:hover{
background:white;
color:black;
}

.section{
padding:40px 20px;
}

.section h2{
font-size:40px;
margin-bottom:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card h3{
margin-bottom:10px;
}

.price{
color:green;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.buy{
display:block;
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:50px;
}
</style>

</head>
<body>

<header>
<div class="logo">MOSTAFA CLEAN SHOP</div>

<div class="icons">
🔍
👤
🛒
</div>
</header>

<section class="hero">
<div class="hero-content">
<h1>Mostafa Clean Shop</h1>
<p>Tout pour une maison propre et saine</p>
<a href="products.html" class="btn">Shop All</a>
</div>
</section>

<section class="section">

<h2>Produits</h2>

<div class="products">

<div class="card">
<img src="images/product1.jpg">
<div class="card-body">
<h3>Asperox</h3>
<div class="price">49 DH</div>
<button class="buy">Ajouter au panier</button>
</div>
</div>

<div class="card">
<img src="images/product2.jpg">
<div class="card-body">
<h3>Dalaa Wooly</h3>
<div class="price">25 DH</div>
<button class="buy">Ajouter au panier</button>
</div>
</div>

</div>

</section>

<footer>
© 2026 Mostafa Clean Shop
</footer>

</body>
</html>
