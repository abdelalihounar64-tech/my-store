<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.product{
  margin:15px;
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  border-radius:10px;
}

/* زر + */
.addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  border:none;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

/* ADMIN */
#admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  padding:20px;
  overflow:auto;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>🛒 My Store</header>

<div class="products" id="products"></div>

<!-- زر + -->
<button class="addBtn" onclick="openAdmin()">+</button>

<!-- ADMIN PANEL -->
<div id="admin">

<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="pieces" placeholder="عدد القطع في العلبة">
<textarea id="desc" placeholder="الوصف"></textarea>

<input id="img1" placeholder="رابط الصورة 1">
<input id="img2" placeholder="رابط الصورة 2">

<button onclick="saveProduct()">حفظ</button>
<button onclick="closeAdmin()">إغلاق</button>

</div>

<script>

// تحميل المنتجات
let products = JSON.parse(localStorage.getItem("products")) || [];

// عرض المنتجات
function loadProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,index)=>{
    container.innerHTML += `
      <div class="product" onclick="openProduct(${index})">
        <img src="${p.images[0]}">
        <h3>${p.name}</h3>
      </div>
    `;
  });
}

// فتح المنتج
function openProduct(i){
  localStorage.setItem("selectedProduct", i);
  window.location.href = "product.html";
}

// ADMIN
function openAdmin(){
  let pass = prompt("كلمة السر");
  if(pass === "123@123"){
    document.getElementById("admin").style.display = "block";
  }else{
    alert("كلمة سر خاطئة");
  }
}

function closeAdmin(){
  document.getElementById("admin").style.display = "none";
}

// حفظ المنتج
function saveProduct(){

  let newProduct = {
    name: document.getElementById("name").value,
    price: parseFloat(document.getElementById("price").value),
    description: document.getElementById("desc").value,
    pieces: parseInt(document.getElementById("pieces").value),
    images: [
      document.getElementById("img1").value,
      document.getElementById("img2").value
    ]
  };

  products.push(newProduct);

  localStorage.setItem("products", JSON.stringify(products));

  alert("تمت الإضافة ✅");

  location.reload();
}

loadProducts();

</script>

</body>
</html>
