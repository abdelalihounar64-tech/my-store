<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 20px;
}

.container {
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0;
}

.btn {
  background: orange;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  color: white;
}

.cart-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}
</style>

</head>
<body>

<header>
  <h1>My Store 🛒</h1>
  <button onclick="goAdmin()">Admin</button>
</header>

<div class="container" id="products"></div>

<button class="cart-btn" onclick="goCart()">🛒</button>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

// ترتيب A-Z
products.sort((a, b) => a.name.localeCompare(b.name));

let container = document.getElementById("products");

products.forEach((p, index) => {
  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${p.images[0]}" onclick="openProduct(${index})">
    <h3>${p.name}</h3>
    <button class="btn" onclick="addToCart(${index})">أضف للسلة</button>
  `;

  container.appendChild(div);
});

// إضافة للسلة
function addToCart(index) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(products[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("تمت الإضافة للسلة");
}

// فتح المنتج
function openProduct(index) {
  localStorage.setItem("productIndex", index);
  window.location.href = "product.html";
}

// الذهاب للسلة
function goCart() {
  window.location.href = "cart.html";
}

// admin
function goAdmin() {
  let pass = prompt("ادخل الكود");
  if (pass == "1234") {
    window.location.href = "admin.html";
  } else {
    alert("كود خاطئ");
  }
}
</script>

</body>
</html>
