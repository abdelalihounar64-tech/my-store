<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{
background:#111;color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
padding:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
background:orange;
color:white;
width:60px;height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>My Store 🛒</h2>
<button onclick="goAdmin()">Admin</button>
</header>

<div class="grid" id="products"></div>

<div class="fab" onclick="goAdmin()">+</div>

<script>

function goAdmin(){
window.location="admin.html";
}

function load(){
let products = JSON.parse(localStorage.getItem("products")) || [];

let html="";
products.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
</div>`;
});

document.getElementById("products").innerHTML = html;
}

load();

</script>

</body>
</html>
