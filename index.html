<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{margin:0;font-family:sans-serif;background:#f3f3f3}

/* HEADER */
header{
background:#000;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.admin{
background:red;
color:#fff;
padding:8px 15px;
border-radius:20px;
border:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}
.card{
background:#fff;
border-radius:15px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* BUTTONS */
.btn{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}
.add{background:orange;color:#fff;width:100%}
.go{background:green;color:#fff;width:100%}

/* FLOAT + */
.fab{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:orange;
color:#fff;
font-size:30px;
border-radius:50%;
border:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.box{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
}

/* PRODUCT PAGE */
.viewer{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#fff;
display:none;
overflow:auto;
}
.big{
width:100%;
height:250px;
object-fit:cover;
}
.thumbs img{
width:60px;height:60px;margin:5px;border-radius:10px;
}

/* CART */
.cart{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#fff;
display:none;
padding:15px;
}
.item{
background:#eee;
padding:10px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<header>
<h2>My Store 🛒</h2>
<button class="admin" onclick="admin()">Admin</button>
</header>

<div class="products" id="products"></div>

<button class="fab" onclick="openAdd()">+</button>

<!-- ADD -->
<div class="modal" id="addBox">
<div class="box">
<input id="name" placeholder="اسم"><br>
<input id="boxCount" placeholder="عدد القطع في العلبة"><br>
<input id="img1" placeholder="صورة 1"><br>
<input id="img2" placeholder="صورة 2"><br>
<input id="img3" placeholder="صورة 3"><br>
<input id="img4" placeholder="صورة 4"><br>
<button onclick="save()">حفظ</button>
<button onclick="closeAdd()">إغلاق</button>
</div>
</div>

<!-- PRODUCT -->
<div class="viewer" id="viewer">
<img id="big" class="big">
<div class="thumbs" id="thumbs"></div>

<br>

<button onclick="setType('piece')">قطعة</button>
<button onclick="setType('box')">علبة</button>

<h2 id="qty">1</h2>

<button onclick="plus()">+</button>
<button onclick="minus()">-</button>

<button class="btn add" onclick="addCart()">أضف للسلة</button>
<button class="btn go" onclick="openCart()">اذهب للسلة</button>

<button onclick="closeViewer()">رجوع</button>
</div>

<!-- CART -->
<div class="cart" id="cart"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function render(){
let box="";
products.forEach((p,i)=>{
box+=`
<div class="card">
<img src="${p.images[0]}" onclick="openProduct(${i})">
<h3>${p.name}</h3>
<button onclick="del(${i})">❌</button>
</div>
`;
});
document.getElementById("products").innerHTML=box;
}
render();

/* ADD */
function openAdd(){addBox.style.display="flex";}
function closeAdd(){addBox.style.display="none";}

function save(){
if(!name.value || !img1.value){
alert("دخل الاسم وصورة");
return;
}

let newP={
name:name.value,
box:parseInt(boxCount.value)||1,
images:[img1.value,img2.value,img3.value,img4.value]
};

products.push(newP);
localStorage.setItem("products",JSON.stringify(products));

closeAdd();
render();
}

/* DELETE */
function del(i){
if(confirm("حذف؟")){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}
}

/* VIEW */
let current;
let type="piece";
let quantity=1;

function openProduct(i){
current=products[i];
viewer.style.display="block";
big.src=current.images[0];

let t="";
current.images.forEach(img=>{
if(img){
t+=`<img src="${img}" onclick="big.src='${img}'">`;
}
});
thumbs.innerHTML=t;

quantity=1;
update();
}

function closeViewer(){viewer.style.display="none";}

/* TYPE */
function setType(t){
type=t;
if(type=="box"){
quantity=current.box;
}else{
quantity=1;
}
update();
}

/* PLUS MINUS */
function plus(){
if(type=="box"){
quantity+=current.box;
}else{
quantity++;
}
update();
}

function minus(){
if(type=="box"){
quantity-=current.box;
if(quantity<current.box) quantity=current.box;
}else{
quantity--;
if(quantity<1) quantity=1;
}
update();
}

function update(){
qty.innerText=quantity;
}

/* CART */
function addCart(){
cart.push({
name:current.name,
qty:quantity,
img:current.images[0]
});
alert("تمت الإضافة");
}

function openCart(){
let c="";
cart.forEach((i,index)=>{
c+=`
<div class="item">
<img src="${i.img}" width="50">
<div>${i.name} (${i.qty})</div>
<button onclick="remove(${index})">❌</button>
</div>
`;
});

c+=`
<button onclick="whatsapp()">اطلب عبر واتساب</button>
<button onclick="closeCart()">رجوع</button>
`;

cart.innerHTML=c;
cart.style.display="block";
}

function closeCart(){
cart.style.display="none";
}

function remove(i){
cart.splice(i,1);
openCart();
}

/* WHATSAPP */
function whatsapp(){
let msg="طلب:\n";
cart.forEach(i=>{
msg+=i.name+" x "+i.qty+"\n";
});
window.open("https://wa.me/212XXXXXXXXX?text="+encodeURIComponent(msg));
}

/* ADMIN */
function admin(){
let p=prompt("password");
if(p!="123@123"){
alert("خطأ");
}
}
</script>

</body>
</html>
