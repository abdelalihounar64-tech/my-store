<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostafa Clean Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */

header{
background:#fff;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
font-size:18px;
font-weight:bold;
}

.menu{
font-size:28px;
cursor:pointer;
}

.header-icons{
display:flex;
gap:20px;
font-size:24px;
}

/* HERO */

.hero{
height:500px;
background:url('https://i.ibb.co/qYL5PBx6/Screenshot-2026-05-29-14-28-04-640-edit-com-miui-gallery.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
}

.hero-content{
position:relative;
z-index:2;
}

.shop-btn{
padding:15px 40px;
border:2px solid #fff;
border-radius:50px;
color:#fff;
text-decoration:none;
font-size:22px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(4px);
}

/* PRODUCTS */

.section{
padding:25px 15px;
}

.section h2{
font-size:40px;
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.card h3{
font-size:16px;
text-align:center;
min-height:45px;
}

.buy-btn{
width:100%;
padding:12px;
border:none;
background:black;
color:white;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="menu">☰</div>

<div class="logo">
MOSTAFA CLEAN SHOP
</div>

<div class="header-icons">
<span>🔍</span>
<span>🛒</span>
</div>

</header>

<section class="hero">

<div class="hero-content">
<a href="products.html" class="shop-btn">
Shop All
</a>
</div>

</section>

<section class="section">

<h2>Produits</h2>

<div class="products">

<!-- A -->

<div class="card">
<img src="https://i.ibb.co/Qjz9xgdQ/1779799104968.png" alt="Asperox">

<div class="card-body">
<h3>Asperox Magic Yellow</h3>
<button class="buy-btn">
Ajouter au panier
</button>
</div>

</div>

<!-- C -->

<div class="card">
<img src="images/clenix-dalaa.jpg" alt="Clenix Dalaa">

<div class="card-body">
<h3>Clenix Dalaa 330</h3>
<button class="buy-btn">
Ajouter au panier
</button>
</div>

</div>

</div>

</section>

<footer>
© 2026 Mostafa Clean Shop
</footer>

</body>
</html>
