<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostafa Clean Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */

header{
background:white;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
text-align:center;
}

.menu{
font-size:28px;
cursor:pointer;
}

.header-icons{
display:flex;
gap:18px;
}

.header-icons a{
text-decoration:none;
font-size:24px;
color:#222;
}

/* HERO */

.hero{
height:500px;
background:url('https://i.ibb.co/qYL5PBx6/Screenshot-2026-05-29-14-28-04-640-edit-com-miui-gallery.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
}

.hero-content{
position:relative;
z-index:2;
}

.btn{
display:inline-block;
padding:15px 40px;
border:2px solid white;
border-radius:50px;
text-decoration:none;
font-size:22px;
color:white;
background:rgba(255,255,255,.1);
backdrop-filter:blur(5px);
}

/* PRODUCTS */

.section{
padding:30px 15px;
}

.section h2{
font-size:42px;
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.card h3{
font-size:18px;
margin-bottom:8px;
}

.price{
font-size:20px;
font-weight:bold;
color:#16a34a;
margin-bottom:10px;
}

.buy-btn{
width:100%;
padding:12px;
border:none;
background:black;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* FOOTER */

footer{
margin-top:40px;
background:#111;
color:white;
text-align:center;
padding:25px;
}

</style>

</head>

<body>

<header>

<div class="menu">☰</div>

<div class="logo">
MOSTAFA CLEAN SHOP
</div>

<div class="header-icons">
<a href="#">🔍</a>
<a href="cart.html">🛒</a>
</div>

</header>

<section class="hero">

<div class="hero-content">
<a href="products.html" class="btn">
Shop All
</a>
</div>

</section>

<section class="section">

<h2>Produits</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/400x500">
<div class="card-body">
<h3>Asperox</h3>
<div class="price">49 DH</div>
<button class="buy-btn">
Ajouter au panier
</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x500">
<div class="card-body">
<h3>Dalaa Wooly</h3>
<div class="price">25 DH</div>
<button class="buy-btn">
Ajouter au panier
</button>
</div>
</div>

</div>

</section>

<footer>
© 2026 Mostafa Clean Shop
</footer>

</body>
</html>
