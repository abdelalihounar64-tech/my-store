<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{background:#000;color:#fff;padding:15px;text-align:center;}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
}

.product{
  margin:10px;
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  border-radius:10px;
}

.addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  border:none;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

#admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  padding:20px;
  overflow:auto;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>🛒 My Store</header>

<div class="products" id="products"></div>

<button class="addBtn" onclick="openAdmin()">+</button>

<div id="admin">
<h2>إضافة منتج</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="pieces" placeholder="عدد القطع في العلبة">
<textarea id="desc" placeholder="الوصف"></textarea>

<input id="img1" placeholder="رابط الصورة 1">
<input id="img2" placeholder="رابط الصورة 2">
<input id="img3" placeholder="رابط الصورة 3">
<input id="img4" placeholder="رابط الصورة 4">

<button onclick="saveProduct()">حفظ</button>
<button onclick="closeAdmin()">إغلاق</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products"));
if(!products){
  products = [];
  localStorage.setItem("products", JSON.stringify(products));
}

function loadProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  if(products.length === 0){
    container.innerHTML = "<p style='text-align:center'>لا يوجد منتجات</p>";
    return;
  }

  products.forEach((p,index)=>{
    container.innerHTML += `
      <div class="product" onclick="openProduct(${index})">
        <img src="${p.images[0]}">
        <h3>${p.name}</h3>
      </div>
    `;
  });
}

function openProduct(i){
  localStorage.setItem("selectedProduct", i);
  window.location.href = "product.html";
}

function openAdmin(){
  let pass = prompt("كلمة السر");
  if(pass === "123@123"){
    document.getElementById("admin").style.display = "block";
  }else{
    alert("كلمة سر خاطئة");
  }
}

function closeAdmin(){
  document.getElementById("admin").style.display = "none";
}

function saveProduct(){

  let name = document.getElementById("name").value.trim();
  let price = parseFloat(document.getElementById("price").value);
  let pieces = parseInt(document.getElementById("pieces").value);
  let desc = document.getElementById("desc").value;

  let images = [
    document.getElementById("img1").value,
    document.getElementById("img2").value,
    document.getElementById("img3").value,
    document.getElementById("img4").value
  ].filter(img => img !== "");

  if(!name || images.length === 0){
    alert("دخل المعلومات مزيان");
    return;
  }

  let newProduct = {
    name,
    price: price || 0,
    description: desc,
    pieces: pieces || 1,
    images
  };

  products.push(newProduct);
  localStorage.setItem("products", JSON.stringify(products));

  alert("تمت الإضافة ✅");
  location.reload();
}

loadProducts();

</script>

</body>
</html>
