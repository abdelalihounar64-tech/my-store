<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mostafa Store</title>

  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    /* HEADER */

    header{
      width:100%;
      height:80px;
      background:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-bottom:1px solid #ddd;
      position:sticky;
      top:0;
      z-index:1000;
    }

    .left-icons,
    .right-icons{
      display:flex;
      gap:22px;
      font-size:30px;
      color:#111;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#111;
    }

    /* HERO */

    .hero{
      width:100%;
      height:350px;
      overflow:hidden;
    }

    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* PRODUCTS TITLE */

    .products-header{
      padding:25px 25px 15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .products-header h2{
      font-size:55px;
      font-weight:700;
      color:#111;
    }

    .products-header a{
      text-decoration:none;
      font-size:28px;
      color:#111;
    }

    /* PRODUCT CARD */

    .products{
      padding:0 20px 40px;
    }

    .product-card{
      width:100%;
      background:white;
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    .product-card img{
      width:100%;
      display:block;
    }

    .product-info{
      padding:20px;
    }

    .product-info h3{
      font-size:28px;
      color:#111;
    }

    /* MOBILE */

    @media(max-width:768px){

      header{
        height:70px;
      }

      .logo{
        font-size:22px;
      }

      .left-icons,
      .right-icons{
        font-size:24px;
        gap:18px;
      }

      .hero{
        height:250px;
      }

      .products-header h2{
        font-size:34px;
      }

      .products-header a{
        font-size:22px;
      }

      .product-info h3{
        font-size:22px;
      }

    }

  </style>
</head>
<body>

  <!-- HEADER -->

  <header>

    <div class="left-icons">
      <i class="fa-solid fa-bars"></i>
      <i class="fa-solid fa-magnifying-glass"></i>
    </div>

    <div class="logo">
      Mostafa Store
    </div>

    <div class="right-icons">
      <i class="fa-regular fa-user"></i>
      <i class="fa-solid fa-bag-shopping"></i>
    </div>

  </header>

  <!-- HERO IMAGE -->

  <section class="hero">

    <!-- صورة المتجر -->
    <img src="mostafa-store.jpg" alt="Mostafa Store">

  </section>

  <!-- PRODUCTS -->

  <div class="products-header">
    <h2>Products</h2>
    <a href="#">View all</a>
  </div>

  <!-- PRODUCT -->

  <section class="products">

    <div class="product-card">

      <!-- صورة المنتج -->
      <img src="chapo.jpg" alt="Chapo Shampooing">

      <div class="product-info">
        <h3>Chapo Shampooing</h3>
      </div>

    </div>

  </section>

</body>
</html>
