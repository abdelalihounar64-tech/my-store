<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  position:relative;
}

.admin-btn{
  position:absolute;
  left:10px;
  top:10px;
  background:red;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:8px;
}

.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.product{
  background:#fff;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.product img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.product button{
  margin:5px;
  padding:5px 10px;
  border:none;
  border-radius:8px;
}

.edit{background:orange;color:#fff;}
.delete{background:red;color:#fff;}
</style>
</head>

<body>

<header>
🛒 My Store
<button class="admin-btn" onclick="loginAdmin()">Admin</button>
</header>

<div class="products" id="products"></div>

<script>

// ================== منتجات ==================
let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name:"balai IP harcha",
    price:10.25,
    images:[
      "https://i.ibb.co/VWG6NSVD/1777726032086.png"
    ],
    desc:"منتج تنظيف قوي",
    pieces:16
  },
  {
    name:"Nova kh",
    price:36.5,
    images:[
      "https://i.ibb.co/qLwx7Pyp/file-000000004c74724394121c6f1dbce3b5.png"
    ],
    desc:"حفاضات",
    pieces:4
  }
];

// ترتيب A-Z
products.sort((a,b)=>a.name.localeCompare(b.name));

let container = document.getElementById("products");
let isAdmin = localStorage.getItem("admin") === "true";

// ================== عرض ==================
function display(){
  container.innerHTML = "";

  products.forEach((p,i)=>{

    let adminBtns = "";

    if(isAdmin){
      adminBtns = `
        <button class="edit" onclick="event.stopPropagation(); editProduct(${i})">✏️</button>
        <button class="delete" onclick="event.stopPropagation(); deleteProduct(${i})">❌</button>
      `;
    }

    container.innerHTML += `
      <div class="product" onclick="openProduct(${i})">
        <img src="${p.images[0] || ''}">
        <h3>${p.name}</h3>
        <p>${p.price || 0} DH</p>
        ${adminBtns}
      </div>
    `;
  });
}

display();

// ================== فتح المنتج ==================
function openProduct(i){
  localStorage.setItem("selectedProduct", JSON.stringify(products[i]));
  window.location.href = "product.html";
}

// ================== ADMIN ==================
function loginAdmin(){
  let pass = prompt("الباسورد");

  if(pass === "123@123"){
    localStorage.setItem("admin","true");
    location.reload();
  }else{
    alert("خطأ");
  }
}

// ================== حذف ==================
function deleteProduct(i){
  if(confirm("حذف؟")){
    products.splice(i,1);
    save();
  }
}

// ================== تعديل ==================
function editProduct(i){
  let name = prompt("اسم", products[i].name);
  let price = prompt("ثمن", products[i].price);
  let img = prompt("رابط الصورة", products[i].images[0]);

  if(name){
    products[i].name = name;
    products[i].price = parseFloat(price) || 0;
    products[i].images = [img];
  }

  save();
}

// ================== حفظ ==================
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  location.reload();
}

</script>

</body>
</html>
