<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.main{
  width:100%;
  height:250px;
  object-fit:cover;
}

.row{
  display:flex;
  gap:5px;
  overflow:auto;
}

.row img{
  width:80px;
  height:80px;
  object-fit:cover;
}

.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img{
  width:90%;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div id="box"></div>

<div class="zoom" id="zoom" onclick="closeZoom()">
  <img id="zimg">
</div>

<script>

let p = JSON.parse(localStorage.getItem("selectedProduct"));

let i=0;

function show(){

  let thumbs="";

  p.images.forEach((img,index)=>{
    thumbs+=`<img src="${img}" onclick="change(${index})">`;
  });

  box.innerHTML=`
    <img class="main" src="${p.images[i]}" onclick="openZoom('${p.images[i]}')">

    <div class="row">${thumbs}</div>

    <h2>${p.name}</h2>
    <p>${p.desc}</p>

    <input id="price" placeholder="دخل الثمن" oninput="calc()">

    <h2 id="final">DH 0</h2>

    <button onclick="add()">أضف للسلة</button>
    <button onclick="goCart()">اذهب للسلة</button>
  `;
}

show();

function change(index){
  i=index;
  show();
}

function openZoom(src){
  zoom.style.display="flex";
  zimg.src=src;
}

function closeZoom(){
  zoom.style.display="none";
}

function calc(){
  let v = price.value || 0;
  final.innerText="DH "+v;
}

function add(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name:p.name,
    price:price.value || 0,
    image:p.images[0],
    qty:1
  });

  localStorage.setItem("cart",JSON.stringify(cart));

  alert("تمت الإضافة");
}

function goCart(){
  location.href="cart.html";
}

</script>

</body>
</html>
