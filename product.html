<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asperox Magic Yellow</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
}

.main-image{
width:100%;
border-radius:20px;
background:white;
cursor:pointer;
transition:.3s;
}

.thumbnails{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:15px;
padding-bottom:5px;
}

.thumbnails img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #ddd;
background:white;
}

.product-title{
font-size:42px;
font-weight:bold;
margin-top:25px;
margin-bottom:20px;
}

.price-input{
width:100%;
padding:18px;
font-size:24px;
border:1px solid #ccc;
border-radius:18px;
outline:none;
direction:rtl;
text-align:right;
margin-bottom:20px;
}

.price-input::placeholder{
text-align:right;
}

select{
width:100%;
padding:18px;
font-size:24px;
border-radius:18px;
border:1px solid #ccc;
direction:rtl;
margin-bottom:25px;
}

.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
margin-bottom:25px;
}

.qty-box button{
width:90px;
height:90px;
font-size:40px;
border:none;
border-radius:20px;
background:#000;
color:white;
cursor:pointer;
}

#quantity{
font-size:60px;
font-weight:bold;
min-width:100px;
text-align:center;
}

.cart-btn{
width:100%;
padding:20px;
font-size:28px;
background:black;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.description{
margin-top:25px;
background:white;
padding:20px;
border-radius:20px;
line-height:1.8;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<img
id="mainImage"
class="main-image"
src="https://i.ibb.co/DPG2xsQk/file-0000000029d0724684d8971c36b3fbb4.png">

<div class="thumbnails">

<img
src="https://i.ibb.co/DPG2xsQk/file-0000000029d0724684d8971c36b3fbb4.png"
onclick="changeImage(this.src)">

<img
src="https://i.ibb.co/PG24Dn7P/1779799091882.png"
onclick="changeImage(this.src)">

<img
src="https://i.ibb.co/4wWrXNWv/file-00000000c7387246b04adb92ee45ef54.png"
onclick="changeImage(this.src)">

</div>

<h1 class="product-title">
Asperox Magic Yellow
</h1>

<input
type="number"
class="price-input"
placeholder="الثمن (اختياري)"
value="">

<select id="unit">

<option value="piece">
قطعة
</option>

<option value="carton">
علبة (12 قطعة)
</option>

</select>

<div class="qty-box">

<button onclick="increaseQuantity()">
+
</button>

<span id="quantity">
0
</span>

<button onclick="decreaseQuantity()">
-
</button>

</div>

<button class="cart-btn">
إضافة إلى السلة
</button>

<div class="description">

منظف قوي لإزالة الدهون الصعبة
والأوساخ من المطبخ والأسطح المختلفة.

يمكن استخدامه على:

• المطابخ

• الأفران

• الشوايات

• المعادن

• البلاستيك

• الأسطح المنزلية

</div>

</div>

<script>

function changeImage(src){
document.getElementById("mainImage").src = src;
}

document.getElementById("mainImage")
.addEventListener("click",function(){

if(this.style.transform==="scale(2)"){
this.style.transform="scale(1)";
}else{
this.style.transform="scale(2)";
}

});

let quantity = 0;

const quantityValue =
document.getElementById("quantity");

const unitSelect =
document.getElementById("unit");

function increaseQuantity(){

const step =
unitSelect.value === "carton"
? 12
: 1;

quantity += step;

quantityValue.textContent =
quantity;

}

function decreaseQuantity(){

const step =
unitSelect.value === "carton"
? 12
: 1;

quantity -= step;

if(quantity < 0){
quantity = 0;
}

quantityValue.textContent =
quantity;

}

unitSelect.addEventListener(
"change",
()=>{

quantity = 0;

quantityValue.textContent =
quantity;

});

</script>

</body>
</html>
