<!-- PRODUCT PAGE -->

<div class="product-info">

  <!-- إدخال الثمن -->

  <input
  type="number"
  id="priceInput"
  class="price-input"
  placeholder="دخل الثمن">

  <!-- السعر -->

  <h1 id="totalPrice">
    DH 0
  </h1>

  <!-- TYPE -->

  <div class="type-buttons">

    <button
    class="type-btn active"
    id="pieceBtn"
    onclick="selectType('piece')">

    قطعة

    </button>

    <button
    class="type-btn"
    id="boxBtn"
    onclick="selectType('box')">

    علبة

    </button>

  </div>

  <!-- QUANTITY -->

  <div class="quantity-box">

    <button onclick="increaseQuantity()">
      +
    </button>

    <span id="quantity">
      1
    </span>

    <button onclick="decreaseQuantity()">
      -
    </button>

  </div>

  <!-- BUTTONS -->

  <button
  class="cart-btn"
  onclick="addToCart()">

  أضف للسلة

  </button>

  <button
  class="buy-btn"
  onclick="goToCart()">

  اذهب للسلة

  </button>

</div>
