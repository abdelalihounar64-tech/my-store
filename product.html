<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

/* slider */
.slider{
  display:flex;
  overflow-x:auto;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  cursor:pointer;
}

/* zoom */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  width:90%;
}

.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.buttons{
  display:flex;
  gap:10px;
}

.buttons button{
  flex:1;
  padding:10px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.qty{
  text-align:center;
  margin-top:20px;
}

.minus{
  padding:10px;
  margin-top:10px;
}

.order{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="slider" id="slider"></div>

<div class="viewer" id="viewer" onclick="closeImg()">
  <img id="bigImg">
</div>

<div class="container">

<h2 id="name"></h2>
<p id="desc"></p>

<div class="price" id="price"></div>

<div class="buttons">
  <button onclick="addPiece()">قطعة</button>
  <button onclick="addBox()">علبة</button>
</div>

<div class="qty">
  <h1 id="qty">0</h1>
  <button class="minus" onclick="minus()">➖</button>
</div>

<div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
  
  <button onclick="addToCart()" style="padding:15px; background:orange; color:#fff; border:none; border-radius:10px;">
    أضف للسلة
  </button>

  <button onclick="goCart()" style="padding:15px; background:green; color:#fff; border:none; border-radius:10px;">
    اذهب للسلة
  </button>

</div>

</div>

<script>

// جلب البيانات من الرابط
const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let pricePiece = parseFloat(params.get("price"));
let piecesInBox = parseInt(params.get("box"));
let img1 = params.get("img1");
let img2 = params.get("img2");
let img3 = params.get("img3");
let desc = params.get("desc");

// عرض البيانات
document.getElementById("name").innerText = name;
document.getElementById("desc").innerText = desc;

// الصور
let slider = document.getElementById("slider");

function addImage(src){
  if(!src) return;
  let img = document.createElement("img");
  img.src = src;
  img.onclick = () => openImg(src);
  slider.appendChild(img);
}

addImage(img1);
addImage(img2);
addImage(img3);

// zoom
function openImg(src){
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("bigImg").src = src;
}

function closeImg(){
  document.getElementById("viewer").style.display = "none";
}

// الحساب
let quantity = 0;

function update(){
  document.getElementById("qty").innerText = quantity;
  document.getElementById("price").innerText = (quantity * pricePiece) + " DH";
}

function addPiece(){
  quantity += 1;
  update();
}

function addBox(){
  quantity += piecesInBox;
  update();
}

function minus(){
  if(quantity > 0){
    quantity--;
    update();
  }
}

// واتساب
function order(){
  if(quantity == 0){
    alert("اختار الكمية");
    return;
  }

  let msg = `السلام، بغيت نطلب ${name}\n`;
  msg += `الكمية: ${quantity} قطعة`;

  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(msg));
}

// أول تحديث
update();

</script>

</body>
</html>
