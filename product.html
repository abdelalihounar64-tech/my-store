<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  cursor:pointer;
}

/* تكبير الصورة */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.viewer img{
  width:90%;
}

.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.buttons{
  display:flex;
  gap:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.qty{
  text-align:center;
  margin-top:20px;
}

.minus{
  padding:12px;
  margin-top:10px;
  font-size:18px;
}

.order{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:10px;
}

.go{
  width:100%;
  margin-top:10px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<!-- الصور -->
<div class="slider" id="slider"></div>

<div class="viewer" id="viewer" onclick="closeImg()">
  <img id="bigImg">
</div>

<div class="container">

<h2 id="name"></h2>
<p id="desc"></p>

<div class="price" id="price">0 DH</div>

<div class="buttons">
  <button onclick="addPiece()">قطعة</button>
  <button onclick="addBox()">علبة</button>
</div>

<div class="qty">
  <h1 id="qty">0</h1>
  <button class="minus" onclick="minus()">➖</button>
</div>

<button class="order" onclick="addToCart()">أضف للسلة</button>
<button class="go" onclick="goCart()">اذهب للسلة</button>

</div>

<script>

// جلب البيانات
const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let pricePiece = parseFloat(params.get("price"));
let piecesInBox = parseInt(params.get("box"));
let img1 = params.get("img1");
let img2 = params.get("img2");
let img3 = params.get("img3");
let desc = params.get("desc");

// عرض البيانات
document.getElementById("name").innerText = name;
document.getElementById("desc").innerText = desc;

// الصور
let slider = document.getElementById("slider");

function addImage(src){
  if(!src) return;
  let img = document.createElement("img");
  img.src = src;
  img.onclick = () => openImg(src);
  slider.appendChild(img);
}

addImage(img1);
addImage(img2);
addImage(img3);

// تكبير
function openImg(src){
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("bigImg").src = src;
}

function closeImg(){
  document.getElementById("viewer").style.display = "none";
}

// الكمية
let quantity = 0;

function update(){
  document.getElementById("qty").innerText = quantity;
  document.getElementById("price").innerText = (quantity * pricePiece) + " DH";
}

function addPiece(){
  quantity += 1;
  update();
}

function addBox(){
  quantity += piecesInBox;
  update();
}

function minus(){
  if(quantity > 0){
    quantity--;
    update();
  }
}

// السلة
function addToCart(){
  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let cart = [];

  try{
    cart = JSON.parse(localStorage.getItem("cart")) || [];
  }catch(e){
    cart = [];
  }

  cart.push({
    name: name,
    qty: quantity,
    price: quantity * pricePiece
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة للسلة ✅");
}

function goCart(){
  window.location.href = "cart.html";
}

// أول تشغيل
update();

</script>

</body>
</html>
