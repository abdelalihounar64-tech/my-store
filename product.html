<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
}

img{
  width:100%;
  border-radius:10px;
}

h1{
  margin-top:15px;
}

p{
  color:#555;
}

button{
  width:100%;
  padding:15px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="container">

<img id="image">

<h1 id="title"></h1>

<p id="description"></p>

<button onclick="order()">اطلب عبر واتساب</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

let title = document.getElementById("title");
let description = document.getElementById("description");
let image = document.getElementById("image");

if(name === "asperox"){
  title.innerText = "Asperox";
  description.innerText = "منظف قوي لإزالة الدهون الصعبة بسرعة ⚡ مناسب للمطبخ والفرن والأسطح.";
  image.src = "https://i.imgur.com/8zQZ7ZR.jpg";
}

if(name === "aluminium"){
  title.innerText = "Aluminium";
  description.innerText = "ورق ألمنيوم عالي الجودة متعدد الاستعمالات للمطبخ والتخزين.";
  image.src = "https://i.imgur.com/ZK7y9Fh.jpg";
}

function order(){
  let text = "السلام، بغيت نطلب " + title.innerText;
  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
