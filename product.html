<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

img{width:100%;border-radius:10px}

.qtyBox{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
}

.add{background:orange;color:#fff;width:90%}
.go{background:green;color:#fff;width:90%}
</style>
</head>

<body>

<div id="content"></div>

<script>

let data=JSON.parse(localStorage.getItem("products"));
let i=localStorage.getItem("current");
let p=data[i];

let q=1;

let imgs="";
p.images.forEach(img=>{
  if(img) imgs+=`<img src="${img}">`;
});

content.innerHTML=`
${imgs}
<h2>${p.name}</h2>

<input id="price" placeholder="دخل الثمن">

<h2 id="total">DH 0</h2>

<div class="qtyBox">
<button onclick="minus()">-</button>
<span id="q">1</span>
<button onclick="plus()">+</button>
</div>

<button onclick="useBox()">علبة (${p.box})</button>

<button class="add" onclick="addCart()">أضف للسلة</button>
<button class="go" onclick="goCart()">اذهب للسلة</button>
`;

function plus(){
  q++;
  update();
}

function minus(){
  if(q>1) q--;
  update();
}

function useBox(){
  q=parseInt(p.box||1);
  update();
}

function update(){
  document.getElementById("q").innerText=q;
  let price=Number(document.getElementById("price").value||0);
  document.getElementById("total").innerText="DH "+(price*q);
}

function addCart(){

  let price=Number(document.getElementById("price").value||0);

  let cart=JSON.parse(localStorage.getItem("cart"))||[];

  cart.push({
    name:p.name,
    qty:q,
    price:price*q,
    image:p.images[0]
  });

  localStorage.setItem("cart",JSON.stringify(cart));

  alert("تمت الإضافة");
}

function goCart(){
  window.location="cart.html";
}

document.getElementById("price").oninput=update;

</script>

</body>
</html>
