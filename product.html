<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{margin:0;font-family:Arial;}
header{background:#000;color:#fff;padding:15px;text-align:center;}

.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}
.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  scroll-snap-align:start;
  cursor:pointer;
}

.container{padding:15px;}

.price{font-size:22px;font-weight:bold;}

.buttons{display:flex;gap:10px;margin-top:10px;}
.buttons button{
  flex:1;
  padding:10px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.qty{text-align:center;margin-top:20px;font-size:28px;}

.minus{
  display:block;
  margin:10px auto;
  padding:10px;
  font-size:20px;
}

.addCart{
  width:100%;
  padding:15px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.goCart{
  width:100%;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="slider" id="slider"></div>

<div class="container">

<h2 id="name"></h2>
<p id="desc"></p>
<div class="price" id="price"></div>

<div class="buttons">
<button onclick="addBox()">علبة</button>
<button onclick="addPiece()">قطعة</button>
</div>

<div class="qty" id="qty">0</div>

<button class="minus" onclick="minus()">➖</button>

<button class="addCart" onclick="addToCart()">أضف للسلة</button>
<button class="goCart" onclick="goCart()">اذهب للسلة</button>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products"));
let i = localStorage.getItem("selectedProduct");
let p = products[i];

let quantity = 0;

document.getElementById("name").innerText = p.name;
document.getElementById("desc").innerText = p.description;

let slider = document.getElementById("slider");
p.images.forEach(img=>{
  slider.innerHTML += `<img src="${img}" onclick="zoom('${img}')">`;
});

function update(){
  let total = quantity * p.price;
  document.getElementById("price").innerText = "DH " + total;
  document.getElementById("qty").innerText = quantity;
}

function addPiece(){
  quantity += 1;
  update();
}

function addBox(){
  quantity += p.pieces;
  update();
}

function minus(){
  if(quantity>0){
    quantity--;
    update();
  }
}

function addToCart(){
  if(quantity==0){
    alert("اختار الكمية");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name:p.name,
    quantity:quantity,
    price:p.price * quantity
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة للسلة");
}

function goCart(){
  window.location.href="cart.html";
}

function zoom(src){
  let win = window.open("");
  win.document.write("<img src='"+src+"' style='width:100%'>");
}

update();

</script>

</body>
</html>
