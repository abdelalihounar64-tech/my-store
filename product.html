<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* IMAGE */
.main{
width:100%;
height:250px;
object-fit:contain;
background:white;
}

.thumbs{
display:flex;
gap:5px;
padding:10px;
overflow:auto;
}
.thumbs img{
width:60px;height:60px;border-radius:10px;
}

/* ZOOM */
.zoom{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}
.zoom img{width:90%}

/* CONTENT */
.box{padding:15px;}

input{
width:100%;
padding:10px;
margin:10px 0;
}

/* TYPE */
.type{
display:flex;
gap:10px;
}
.type button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}
.active{background:orange;color:white}

/* QTY */
.qty{
display:flex;
justify-content:center;
gap:15px;
margin:10px;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin:5px 0;
}
.add{background:orange;color:white}
.go{background:green;color:white}
</style>
</head>

<body>

<img id="mainImg" class="main">

<div class="thumbs" id="thumbs"></div>

<div class="box">

<h2 id="name"></h2>

<input id="price" placeholder="دخل الثمن">

<h2 id="total">DH 0</h2>

<div class="type">
<button id="pieceBtn" class="active" onclick="setType('piece')">قطعة</button>
<button id="boxBtn" onclick="setType('box')">علبة</button>
</div>

<div class="qty">
<button onclick="minus()">-</button>
<span id="q">1</span>
<button onclick="plus()">+</button>
</div>

<button class="btn add" onclick="addCart()">أضف للسلة</button>
<button class="btn go" onclick="goCart()">اذهب للسلة</button>

</div>

<div class="zoom" id="zoom" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

let data = JSON.parse(localStorage.getItem("products")) || [];
let id = localStorage.getItem("current");
let p = data.find(x=>x.id==id);

let qty=1;
let type="piece";
let index=0;

// عرض
name.innerText=p.name;
mainImg.src=p.images[0];

// thumbnails
let t="";
p.images.forEach((img,i)=>{
t+=`<img src="${img}" onclick="change(${i})">`;
});
thumbs.innerHTML=t;

// تغيير صورة
function change(i){
index=i;
mainImg.src=p.images[i];
}

// zoom
mainImg.onclick=()=>{
zoom.style.display="flex";
zoomImg.src=p.images[index];
}
function closeZoom(){
zoom.style.display="none";
}

// swipe
let startX=0;

mainImg.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

mainImg.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
index=(index+1)%p.images.length;
}else if(endX-startX>50){
index=(index-1+p.images.length)%p.images.length;
}

mainImg.src=p.images[index];
});

// TYPE
function setType(t){
type=t;

pieceBtn.classList.remove("active");
boxBtn.classList.remove("active");

if(t==="piece"){
pieceBtn.classList.add("active");
qty=1;
}else{
boxBtn.classList.add("active");
qty=parseInt(p.box)||1;
}
update();
}

// +
function plus(){
if(type==="box"){
qty+=parseInt(p.box)||1;
}else{
qty++;
}
update();
}

// -
function minus(){
if(type==="box"){
qty-=parseInt(p.box)||1;
if(qty < (p.box||1)) qty=p.box||1;
}else{
if(qty>1) qty--;
}
update();
}

// حساب
function update(){
q.innerText=qty;
let price=Number(price.value||0);
total.innerText="DH "+(price*qty);
}

price.oninput=update;

// CART
function addCart(){

let price=Number(document.getElementById("price").value||0);

let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({
name:p.name,
qty:qty,
price:price*qty,
img:p.images[0]
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("تمت الإضافة");
}

function goCart(){
window.location="index.html";
}

</script>

</body>
</html>
