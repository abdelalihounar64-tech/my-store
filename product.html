<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  scroll-snap-align:start;
}

.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.buttons{
  display:flex;
  gap:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  font-size:16px;
}

.qty{
  text-align:center;
  margin-top:20px;
}

.qty span{
  font-size:30px;
}

.qty button{
  margin-top:10px;
  padding:10px 20px;
  font-size:20px;
}

.add{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.cart{
  width:100%;
  margin-top:10px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<!-- صور -->
<div class="slider">
  <img src="https://i.ibb.co/VWG6NSVD/1777726032086.png">
  <img src="https://i.ibb.co/zWcrwtGZ/file-000000007b1c7246a9c52dbdf91a5119.png">
</div>

<div class="container">

<h2 id="name">balai IP harcha</h2>

<p id="desc">منتج عالي الجودة للتنظيف، عملي وقوي للاستعمال اليومي.</p>

<div class="price" id="price">0 DH</div>

<!-- اختيار -->
<div class="buttons">
  <button onclick="setPiece()">قطعة</button>
  <button onclick="setBox()">علبة</button>
</div>

<!-- الكمية -->
<div class="qty">
  <span id="qty">0</span><br>
  <button onclick="minus()">➖</button>
</div>

<button class="add" onclick="addToCart()">أضف للسلة</button>
<button class="cart" onclick="goCart()">اذهب للسلة</button>

</div>

<script>

// البيانات
let name = "balai IP harcha";
let pricePiece = 10.25;
let piecesInBox = 16;

let quantity = 0;

// تحديث الثمن
function updatePrice(){
  let total = quantity * pricePiece;
  document.getElementById("price").innerText = total + " DH";
}

// قطعة
function setPiece(){
  quantity += 1;
  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// علبة (16 قطعة)
function setBox(){
  quantity += piecesInBox;
  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// ناقص
function minus(){
  if(quantity > 0){
    quantity--;
    document.getElementById("qty").innerText = quantity;
    updatePrice();
  }
}

// إضافة للسلة (✔️ مصحح)
function addToCart(){

  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name,
    qty: quantity,
    unitPrice: pricePiece, // مهم
    total: quantity * pricePiece
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تزاد للسلة");
}

// الذهاب للسلة
function goCart(){
  window.location.href = "cart.html";
}

</script>

</body>
</html>
