<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}

.slider::-webkit-scrollbar{
  display:none;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  scroll-snap-align:center;
  flex-shrink:0;
}

.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
}

.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:15px;
  gap:10px;
}

.qty button{
  padding:10px;
  font-size:18px;
}

.order{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="slider">
  <img src="https://i.ibb.co/VWG6NSVD/1777726032086.png">
  <img src="https://i.ibb.co/zWcrwtGZ/file-000000007b1c7246a9c52dbdf91a5119.png">
  <img src="https://i.ibb.co/F4vCPYrd/file-00000000a92471f4ad5860c7c41441c8.png">
</div>

<div class="container">

<h2>balai IP harcha</h2>

<p>منتج عالي الجودة للتنظيف، عملي وقوي للاستعمال اليومي.</p>

<div class="price" id="price">10.25 DH</div>

<!-- الأزرار -->
<div class="buttons">
  <button onclick="addPiece()">قطعة</button>
  <button onclick="addBox()">علبة</button>
</div>

<!-- الكمية -->
<div class="qty">
  <button onclick="minus()">➖</button>
  <span id="qty">0</span>
  <button onclick="plus()">➕</button>
</div>

<button class="order" onclick="order()">اطلب عبر واتساب</button>

</div>

<script>

let quantity = 0;

let pricePiece = 10.25;
let piecesInBox = 16;

/* تحديث الثمن */
function updatePrice(){
  let total = pricePiece * quantity;
  document.getElementById("price").innerText = total + " DH";
}

/* + */
function plus(){
  quantity++;
  update();
}

/* - */
function minus(){
  if(quantity > 0){
    quantity--;
    update();
  }
}

/* إضافة قطعة */
function addPiece(){
  quantity += 1;
  update();
}

/* إضافة علبة */
function addBox(){
  quantity += 16;
  update();
}

/* تحديث */
function update(){
  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

/* الطلب */
function order(){
  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let msg = "السلام، بغيت نطلب balai IP harcha\n";
  msg += "الكمية: " + quantity + " قطعة";

  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
