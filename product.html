<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  flex-shrink:0;
  scroll-snap-align:start;
}

.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons button{
  flex:1;
  padding:10px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.qty{
  text-align:center;
  margin-top:15px;
}

.qty span{
  font-size:30px;
  display:block;
}

.qty button{
  padding:10px 20px;
  font-size:20px;
}

.order{
  width:100%;
  margin-top:15px;
  padding:15px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:10px;
}

.goCart{
  width:100%;
  margin-top:10px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}

/* ZOOM */
#zoomBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#zoomBox img{
  width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<!-- SLIDER -->
<div class="slider" id="slider"></div>

<div class="container">

<h2 id="name"></h2>
<p id="desc"></p>

<input type="number" id="priceInput" placeholder="دخل الثمن" oninput="updatePrice()">

<div class="price" id="price">DH 0</div>

<div class="buttons">
  <button onclick="setType('piece')">قطعة</button>
  <button onclick="setType('box')">علبة</button>
</div>

<div class="qty">
  <span id="qty">0</span>
  <button onclick="minus()">➖</button>
</div>

<button class="order" onclick="addToCart()">أضف للسلة</button>
<button class="goCart" onclick="goCart()">اذهب للسلة</button>

</div>

<!-- ZOOM -->
<div id="zoomBox" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>

// ================== DATA ==================
let product = JSON.parse(localStorage.getItem("selectedProduct"));

let quantity = 0;
let type = "piece";
let piecesInBox = product?.pieces || 1;

// ================== LOAD ==================
document.getElementById("name").innerText = product?.name || "";
document.getElementById("desc").innerText = product?.desc || "";

// ================== IMAGES ==================
let slider = document.getElementById("slider");

(product.images || []).forEach(img=>{
  slider.innerHTML += `
    <img src="${img}" onclick="zoom(this.src)">
  `;
});

// ================== PRICE ==================
function updatePrice(){
  let price = parseFloat(document.getElementById("priceInput").value) || 0;
  document.getElementById("price").innerText = "DH " + (price * quantity);
}

// ================== TYPE ==================
function setType(t){
  type = t;

  if(t === "box"){
    quantity += piecesInBox;
  }else{
    quantity += 1;
  }

  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// ================== MINUS ==================
function minus(){
  if(quantity > 1){
    quantity--;
  }else{
    if(confirm("حذف المنتج؟")){
      quantity = 0;
    }
  }

  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// ================== CART ==================
function addToCart(){

  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let price = parseFloat(document.getElementById("priceInput").value) || 0;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: product.name,
    qty: quantity,
    price: price * quantity,
    image: product.images[0]
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تزاد للسلة");
}

// ================== GO CART ==================
function goCart(){
  window.location.href = "cart.html";
}

// ================== ZOOM ==================
function zoom(src){
  document.getElementById("zoomBox").style.display = "flex";
  document.getElementById("zoomImg").src = src;
}

function closeZoom(){
  document.getElementById("zoomBox").style.display = "none";
}

</script>

</body>
</html>
