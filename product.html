<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

.header{
  padding:15px;
  font-size:18px;
  cursor:pointer;
}

img{
  width:100%;
}

.container{
  padding:15px;
}

h2{
  margin:5px 0;
}

.price{
  color:green;
  margin-bottom:10px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
}

.minus{
  margin-top:10px;
}

.counter{
  margin-top:10px;
  font-size:18px;
}

.desc{
  margin-top:15px;
  color:#555;
}

.whatsapp{
  margin-top:20px;
  width:100%;
  background:green;
}
</style>
</head>

<body>

<div class="header" onclick="goBack()">⬅ رجوع</div>

<img id="img">

<div class="container">

<h2 id="name"></h2>
<div class="price" id="price"></div>

<div class="buttons">
  <button onclick="addPiece()">+ قطعة</button>
  <button onclick="addBox()">+ علبة</button>
</div>

<button class="minus" onclick="minus()">-</button>

<div class="counter">
العدد: <span id="count">0</span>
</div>

<div class="desc" id="desc"></div>

<button class="whatsapp" onclick="sendWhatsApp()">اطلب عبر واتساب</button>

</div>

<script>

let products = {
  asperox:{
    name:"Asperox",
    price:"0 dh",
    img:"https://i.imgur.com/8Km9tLL.jpg",
    pieces:12,
    desc:"منظف قوي وفعال لإزالة الدهون الصعبة ⚡ مناسب للمطبخ والفرن والأسطح الصعبة. يعطي لمعان فوري بدون مجهود."
  },
  aluminium:{
    name:"Aluminium",
    price:"0 dh",
    img:"https://i.imgur.com/2nCt3Sbl.jpg",
    pieces:24,
    desc:"ورق ألمنيوم عالي الجودة 🔥 مثالي للطبخ والتغليف، مقاوم للحرارة وسهل الاستخدام."
  },
  dettol:{
    name:"Dettol",
    price:"0 dh",
    img:"https://i.imgur.com/zYIlgBl.jpg",
    pieces:6,
    desc:"صابون Dettol المضاد للبكتيريا 🛡️ حماية كاملة للعائلة، لطيف على البشرة برائحة منعشة."
  }
};

let count = 0;
let current;

let params = new URLSearchParams(window.location.search);
let productName = params.get("product");

current = products[productName];

document.getElementById("name").innerText = current.name;
document.getElementById("price").innerText = current.price;
document.getElementById("img").src = current.img;
document.getElementById("desc").innerText = current.desc;

function addPiece(){
  count++;
  update();
}

function addBox(){
  count += current.pieces;
  update();
}

function minus(){
  if(count > 0){
    count--;
    update();
  }
}

function update(){
  document.getElementById("count").innerText = count;
}

function goBack(){
  window.location.href="index.html";
}

function sendWhatsApp(){
  if(count === 0){
    alert("اختار الكمية");
    return;
  }

  let message = count + " " + current.name;
  let phone = "212613675970";

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

</script>

</body>
</html>
