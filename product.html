<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asperox Magic Yellow</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
padding:15px;
}

.main-image{
width:100%;
max-height:420px;
object-fit:contain;
border-radius:15px;
cursor:zoom-in;
}

.thumbnails{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:10px;
padding-bottom:5px;
}

.thumbnails img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid #ddd;
}

h1{
margin-top:20px;
font-size:28px;
}

.price-input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:18px;
}

select{
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
font-size:18px;
}

.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;
}

.qty-box button{
width:50px;
height:50px;
font-size:24px;
border:none;
border-radius:10px;
background:#111;
color:#fff;
}

#quantity{
font-size:28px;
font-weight:bold;
min-width:60px;
text-align:center;
}

.cart-btn{
width:100%;
padding:15px;
margin-top:20px;
background:#111;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.description{
margin-top:25px;
line-height:1.7;
color:#444;
}
</style>
</head>

<body>

<img
id="mainImage"
class="main-image"
src="https://i.ibb.co/DPG2xsQk/file-0000000029d0724684d8971c36b3fbb4.png">

<div class="thumbnails">

<img src="https://i.ibb.co/DPG2xsQk/file-0000000029d0724684d8971c36b3fbb4.png"
onclick="changeImage(this.src)">

<img src="https://i.ibb.co/PG24Dn7P/1779799091882.png"
onclick="changeImage(this.src)">

<img src="https://i.ibb.co/4wWrXNWv/file-00000000c7387246b04adb92ee45ef54.png"
onclick="changeImage(this.src)">

</div>

<h1>Asperox Magic Yellow</h1>

<input
type="number"
class="price-input"
placeholder="Prix (optionnel)"
value="0">

<select id="unit">
<option value="piece">Pièce</option>
<option value="carton">Carton (12 pièces)</option>
</select>

<div class="qty-box">

<button onclick="decreaseQuantity()">-</button>

<span id="quantity">0</span>

<button onclick="increaseQuantity()">+</button>

</div>

<button class="cart-btn">
Ajouter au panier
</button>

<div class="description">
Nettoyant puissant pour cuisine, graisse,
surfaces et utilisation quotidienne.
</div>

<script>

function changeImage(src){
document.getElementById("mainImage").src = src;
}

let quantity = 0;

const quantityValue = document.getElementById("quantity");
const unitSelect = document.getElementById("unit");

function increaseQuantity(){

const step =
unitSelect.value === "carton" ? 12 : 1;

quantity += step;

quantityValue.textContent = quantity;
}

function decreaseQuantity(){

const step =
unitSelect.value === "carton" ? 12 : 1;

quantity -= step;

if(quantity < 0){
quantity = 0;
}

quantityValue.textContent = quantity;
}

unitSelect.addEventListener("change",()=>{

quantity = 0;

quantityValue.textContent = quantity;

});

document.getElementById("mainImage").addEventListener("click",function(){

if(this.style.transform==="scale(2)"){
this.style.transform="scale(1)";
}else{
this.style.transform="scale(2)";
}

this.style.transition="0.3s";
});

</script>

</body>
</html>
