<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.container{
  padding:15px;
}

.price{
  font-size:26px;
  font-weight:bold;
  margin:10px 0;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons button{
  flex:1;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#000;
  color:#fff;
  font-size:16px;
}

.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:20px;
}

.qty button{
  width:60px;
  height:60px;
  font-size:22px;
}

.order{
  width:100%;
  margin-top:20px;
  padding:18px;
  background:green;
  color:#fff;
  border:none;
  border-radius:15px;
  font-size:18px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="slider">
  <img src="https://i.ibb.co/VWG6NSVD/1777726032086.png">
</div>

<div class="container">

<h2>balai IP harcha</h2>

<p>منتج عالي الجودة للتنظيف، عملي وقوي للاستعمال اليومي.</p>

<div class="price" id="price">10.25 DH</div>

<div class="buttons">
  <button onclick="setBox()">علبة</button>
  <button onclick="setPiece()">قطعة</button>
</div>

<div class="qty">
  <button onclick="plus()">+</button>
  <span id="qty">1</span>
  <button onclick="minus()">-</button>
</div>

<button class="order" onclick="order()">اطلب عبر واتساب</button>

</div>

<script>

let quantity = 1;
let pricePiece = 10.25;
let piecesInBox = 16;

/* تحديث */
function update(){
  document.getElementById("qty").innerText = quantity;
  document.getElementById("price").innerText = (quantity * pricePiece) + " DH";
}

/* قطعة */
function setPiece(){
  quantity = 1;
  update();
}

/* علبة */
function setBox(){
  quantity = 16;
  update();
}

/* + */
function plus(){
  quantity++;
  update();
}

/* - */
function minus(){
  if(quantity > 0){
    quantity--;
    update();
  }
}

/* واتساب */
function order(){
  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let msg = "السلام، بغيت نطلب balai IP harcha\n";
  msg += "الكمية: " + quantity + " قطعة";

  window.open("https://wa.me/212613675970?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
