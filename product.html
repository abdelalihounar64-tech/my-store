<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

.slider{
  position:relative;
  overflow:hidden;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

.thumbs{
  display:flex;
  gap:5px;
  padding:10px;
  overflow:auto;
}

.thumbs img{
  width:70px;
  height:70px;
  border-radius:10px;
  cursor:pointer;
}

.container{padding:15px}

h2{text-align:center}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

.qty{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px;
}

.qty button{
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
}

.boxBtns{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.boxBtns button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
}

.active{background:orange!important}

.btn{
  width:100%;
  padding:15px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  color:#fff;
}

.add{background:#ff9800}
.go{background:green}

.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img{
  width:90%;
}
</style>
</head>

<body>

<div class="slider">
  <img id="mainImg" onclick="zoomImg()">
</div>

<div class="thumbs" id="thumbs"></div>

<div class="container">

<h2 id="name"></h2>

<input id="price" placeholder="دخل الثمن">

<h2 id="total">DH 0</h2>

<div class="boxBtns">
  <button onclick="setPiece()" id="pieceBtn">قطعة</button>
  <button onclick="setBox()" id="boxBtn">علبة</button>
</div>

<div class="qty">
  <button onclick="minus()">-</button>
  <span id="q">1</span>
  <button onclick="plus()">+</button>
</div>

<button class="btn add" onclick="addCart()">أضف للسلة</button>
<button class="btn go" onclick="goCart()">اذهب للسلة</button>

</div>

<div class="zoom" id="zoom" onclick="closeZoom()">
  <img id="zoomImgEl">
</div>

<script>

let data=JSON.parse(localStorage.getItem("products"));
let i=localStorage.getItem("current");
let p=data[i];

let q=1;
let currentImg=0;

// 👇 تصحيح العلبة ديال المنتجات
if(p.name==="balai IP harcha") p.box=16;
if(p.name==="Nova kh") p.box=4;

// عرض البيانات
name.innerText=p.name;
mainImg.src=p.images[0];

// thumbnails
let thumbsHTML="";
p.images.forEach((img,index)=>{
  if(img){
    thumbsHTML+=`<img src="${img}" onclick="changeImg(${index})">`;
  }
});
thumbs.innerHTML=thumbsHTML;

function changeImg(i){
  currentImg=i;
  mainImg.src=p.images[i];
}

function zoomImg(){
  zoom.style.display="flex";
  zoomImgEl.src=p.images[currentImg];
}

function closeZoom(){
  zoom.style.display="none";
}

// الكمية
function plus(){q++;update();}
function minus(){if(q>1)q--;update();}

// قطعة
function setPiece(){
  q=1;
  pieceBtn.classList.add("active");
  boxBtn.classList.remove("active");
  update();
}

// علبة
function setBox(){
  q=parseInt(p.box)||1;
  boxBtn.classList.add("active");
  pieceBtn.classList.remove("active");
  update();
}

function update(){
  qEl.innerText=q;
  let price=Number(priceEl.value||0);
  total.innerText="DH "+(price*q);
}

let qEl=document.getElementById("q");
let priceEl=document.getElementById("price");

// تحديث مباشر
priceEl.oninput=update;

// السلة
function addCart(){
  let price=Number(priceEl.value||0);

  let cart=JSON.parse(localStorage.getItem("cart"))||[];

  cart.push({
    name:p.name,
    qty:q,
    price:price*q,
    image:p.images[0]
  });

  localStorage.setItem("cart",JSON.stringify(cart));
  alert("تمت الإضافة");
}

function goCart(){
  window.location="cart.html";
}

// swipe الصور 👇
let startX=0;

mainImg.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

mainImg.addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50){
    currentImg=(currentImg+1)%p.images.length;
  }else if(endX-startX>50){
    currentImg=(currentImg-1+p.images.length)%p.images.length;
  }

  mainImg.src=p.images[currentImg];
});

update();

</script>

</body>
</html>
