<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

.main{
  width:100%;
  height:250px;
  object-fit:cover;
}

.row{
  display:flex;
  gap:5px;
  overflow:auto;
}

.row img{
  width:80px;
  height:80px;
  object-fit:cover;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:10px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

.qty{
  text-align:center;
  font-size:25px;
  margin:10px;
}

.minus{
  width:60px;
  height:40px;
  font-size:20px;
}

.zoom{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
}

.zoom img{width:90%}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div id="box"></div>

<div class="zoom" id="zoom" onclick="closeZoom()">
  <img id="zimg">
</div>

<script>

let p = JSON.parse(localStorage.getItem("selectedProduct"));

let i = 0;
let qty = 0;
let price = 0;
let boxSize = p.box || 1; // عدد القطع في العلبة

function show(){

  let thumbs="";

  p.images.forEach((img,index)=>{
    thumbs+=`<img src="${img}" onclick="change(${index})">`;
  });

  document.getElementById("box").innerHTML=`

    <img class="main" src="${p.images[i]}" onclick="zoomImg('${p.images[i]}')">

    <div class="row">${thumbs}</div>

    <h2>${p.name}</h2>
    <p>${p.desc || ""}</p>

    <input id="priceInput" placeholder="دخل الثمن" oninput="setPrice()">

    <h2 id="final">DH 0</h2>

    <div class="btns">
      <button class="btn" onclick="addBox()">علبة</button>
      <button class="btn" onclick="addOne()">قطعة</button>
    </div>

    <div class="qty">${qty}</div>

    <button class="minus" onclick="minus()">-</button>

    <br><br>

    <button onclick="addToCart()">أضف للسلة</button>
    <button onclick="goCart()">اذهب للسلة</button>

  `;
}

show();

function change(index){
  i=index;
  show();
}

function zoomImg(src){
  zoom.style.display="flex";
  zimg.src=src;
}

function closeZoom(){
  zoom.style.display="none";
}

function setPrice(){
  price = parseFloat(document.getElementById("priceInput").value) || 0;
  updateTotal();
}

function addBox(){
  qty += boxSize;
  updateTotal();
  show();
}

function addOne(){
  qty += 1;
  updateTotal();
  show();
}

function minus(){
  if(qty>0) qty--;
  updateTotal();
  show();
}

function updateTotal(){
  document.getElementById("final").innerText = "DH " + (price * qty);
}

function addToCart(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name:p.name,
    price:price * qty,
    qty:qty,
    image:p.images[0]
  });

  localStorage.setItem("cart",JSON.stringify(cart));

  alert("تمت الإضافة");
}

function goCart(){
  location.href="cart.html";
}

</script>

</body>
</html>
