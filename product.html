<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{margin:0;font-family:Arial;}
header{background:#000;color:#fff;padding:15px;text-align:center;}

.slider{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;}
.slider img{width:100%;height:250px;object-fit:cover;scroll-snap-align:start;cursor:pointer;}

#popup{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.9);justify-content:center;align-items:center;
}
#popup img{max-width:90%;}

.container{padding:15px;}
.price{font-size:25px;font-weight:bold;margin:10px 0;}

.buttons{display:flex;gap:10px;}
.buttons button{
flex:1;padding:12px;background:#000;color:#fff;border:none;border-radius:12px;
}

.qty{text-align:center;margin-top:15px;}
.qty span{font-size:30px;display:block;margin-bottom:10px;}

.qty button{padding:10px 25px;font-size:20px;}

.cartBtn{
width:100%;margin-top:10px;padding:15px;
background:#ff9800;color:#fff;border:none;border-radius:12px;
}

.order{
width:100%;margin-top:10px;padding:15px;
background:green;color:#fff;border:none;border-radius:12px;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="slider">
<img src="https://i.ibb.co/VWG6NSVD/1777726032086.png" onclick="zoom(this.src)">
<img src="https://i.ibb.co/F4vCPYrd/file-00000000a92471f4ad5860c7c41441c8.png" onclick="zoom(this.src)">
<img src="https://i.ibb.co/zWcrwtGZ/file-000000007b1c7246a9c52dbdf91a5119.png" onclick="zoom(this.src)">
</div>

<div id="popup" onclick="closeZoom()">
<img id="popupImg">
</div>

<div class="container">

<h2>balai IP harcha</h2>
<p>منتج عالي الجودة للتنظيف.</p>

<div class="price" id="price">DH 0</div>

<div class="buttons">
<button onclick="addPiece()">قطعة</button>
<button onclick="addBox()">علبة</button>
</div>

<div class="qty">
<span id="qty">0</span>
<button onclick="minus()">➖</button>
</div>

<button class="cartBtn" onclick="addToCart()">أضف للسلة</button>
<button class="order" onclick="goCart()">اذهب للسلة</button>

</div>

<script>

let quantity = 0;
let pricePiece = 10.25;

function update(){
document.getElementById("qty").innerText = quantity;
document.getElementById("price").innerText = "DH " + (quantity * pricePiece);
}

function addPiece(){quantity+=1;update();}
function addBox(){quantity+=16;update();}
function minus(){if(quantity>0){quantity--;update();}}

function addToCart(){
if(quantity===0){alert("اختار الكمية");return;}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:"balai IP harcha",
qty:quantity,
price:pricePiece
});

localStorage.setItem("cart", JSON.stringify(cart));
alert("تمت الإضافة للسلة");
}

function goCart(){
window.location.href="cart.html";
}

/* zoom */
function zoom(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}
function closeZoom(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
