<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

header{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
}

/* MENU */
.menu-btn{
  position:absolute;
  top:15px;
  left:15px;
  font-size:25px;
  color:#fff;
  cursor:pointer;
}

.menu{
  position:fixed;
  top:0;
  left:-250px;
  width:250px;
  height:100%;
  background:#000;
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.menu a{
  display:block;
  color:#fff;
  padding:15px;
  text-decoration:none;
  border-bottom:1px solid #444;
}

.menu a:hover{
  background:#333;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slider img{
  width:100%;
  height:250px;
  object-fit:cover;
  scroll-snap-align:start;
}

/* CONTENT */
.container{
  padding:15px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
}

.qty{
  text-align:center;
  margin-top:20px;
}

.qty span{
  font-size:30px;
}

.qty button{
  margin-top:10px;
  padding:10px 20px;
}

.add{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:orange;
  color:#fff;
  border:none;
  border-radius:10px;
}

.cart{
  width:100%;
  margin-top:10px;
  padding:15px;
  background:green;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <a href="index.html">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</div>

<header>تفاصيل المنتج</header>

<!-- الصور -->
<div class="slider">
  <img src="https://i.ibb.co/VWG6NSVD/1777726032086.png">
  <img src="https://i.ibb.co/zWcrwtGZ/file-000000007b1c7246a9c52dbdf91a5119.png">
</div>

<div class="container">

<h2 id="name">balai IP harcha</h2>

<p>منتج عالي الجودة للتنظيف، عملي وقوي للاستعمال اليومي.</p>

<!-- إدخال الثمن -->
<input type="number" id="priceInput" placeholder="دخل الثمن">

<div class="price" id="price">0 DH</div>

<!-- اختيار -->
<div class="buttons">
  <button onclick="setPiece()">قطعة</button>
  <button onclick="setBox()">علبة</button>
</div>

<!-- الكمية -->
<div class="qty">
  <span id="qty">0</span><br>
  <button onclick="minus()">➖</button>
</div>

<button class="add" onclick="addToCart()">أضف للسلة</button>
<button class="cart" onclick="goCart()">اذهب للسلة</button>

</div>

<script>

let name = "balai IP harcha";
let piecesInBox = 16;
let quantity = 0;

// MENU
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.left = (menu.style.left === "0px") ? "-250px" : "0px";
}

// تحديث الثمن
function updatePrice(){

  let userPrice = parseFloat(document.getElementById("priceInput").value);

  if(isNaN(userPrice)){
    userPrice = 0;
  }

  let total = quantity * userPrice;

  document.getElementById("price").innerText = total + " DH";
}

// قطعة
function setPiece(){
  quantity += 1;
  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// علبة
function setBox(){
  quantity += piecesInBox;
  document.getElementById("qty").innerText = quantity;
  updatePrice();
}

// ناقص
function minus(){
  if(quantity > 0){
    quantity--;
    document.getElementById("qty").innerText = quantity;
    updatePrice();
  }
}

// إضافة للسلة
function addToCart(){

  if(quantity === 0){
    alert("اختار الكمية");
    return;
  }

  let userPrice = parseFloat(document.getElementById("priceInput").value);

  if(isNaN(userPrice)){
    userPrice = 0;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: name,
    qty: quantity,
    unitPrice: userPrice,
    total: quantity * userPrice
  });

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تزاد للسلة");
}

// الذهاب للسلة
function goCart(){
  window.location.href = "cart.html";
}

</script>

</body>
</html>
