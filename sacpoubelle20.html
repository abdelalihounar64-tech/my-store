<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sac Poubelle 20</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
}

.main-image{
width:100%;
border-radius:20px;
background:white;
cursor:pointer;
transition:.3s;
}

.thumbnails{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:15px;
padding-bottom:5px;
}

.thumbnails img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #ddd;
background:white;
}

.product-title{
font-size:38px;
font-weight:bold;
margin-top:25px;
margin-bottom:20px;
}

.price-input{
width:100%;
padding:18px;
font-size:22px;
border:1px solid #ccc;
border-radius:18px;
outline:none;
margin-bottom:20px;
text-align:right;
}

select{
width:100%;
padding:18px;
font-size:22px;
border-radius:18px;
border:1px solid #ccc;
margin-bottom:25px;
}

.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
margin-bottom:25px;
}

.qty-box button{
width:80px;
height:80px;
font-size:35px;
border:none;
border-radius:20px;
background:#000;
color:white;
cursor:pointer;
}

#quantity{
font-size:50px;
font-weight:bold;
min-width:100px;
text-align:center;
}

.cart-btn{
width:100%;
padding:18px;
font-size:24px;
background:black;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.description{
margin-top:25px;
background:white;
padding:20px;
border-radius:20px;
line-height:1.8;
font-size:18px;
}

</style>

</head>
