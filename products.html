<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* header */
header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* container */
.container{
  padding:15px;
}

/* الصورة الرئيسية */
.mainImg{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:10px;
}

/* صور صغيرة */
.images{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.images img{
  width:70px;
  height:70px;
  border-radius:10px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
}

.images img.active{
  border:2px solid orange;
}

/* معلومات */
.info{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.info h2{
  margin:0;
}

.price{
  color:green;
  font-size:20px;
  margin:10px 0;
}

/* الكمية */
.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.qty input{
  width:60px;
  padding:8px;
  text-align:center;
}

/* الأزرار */
.buttons{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.cart{
  background:orange;
  color:white;
}

.buy{
  background:green;
  color:white;
}
</style>
</head>

<body>

<header>تفاصيل المنتج</header>

<div class="container">

  <img id="mainImg" class="mainImg">

  <div class="images" id="images"></div>

  <div class="info">
    <h2 id="name"></h2>
    <div class="price" id="price"></div>
    <p id="pieces"></p>

    <div class="qty">
      <span>الكمية:</span>
      <input type="number" id="qty" value="1" min="1">
    </div>

    <div class="buttons">
      <button class="cart" onclick="addToCart()">إضافة للسلة</button>
      <button class="buy" onclick="buyNow()">شراء واتساب</button>
    </div>
  </div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let index = localStorage.getItem("productIndex");

let p = products[index];

// عرض البيانات
document.getElementById("name").innerText = p.name;
document.getElementById("price").innerText = p.price + " dh";
document.getElementById("pieces").innerText = "عدد القطع: " + p.pieces;

// الصورة الرئيسية
let mainImg = document.getElementById("mainImg");
mainImg.src = p.images[0];

// الصور الصغيرة
let imagesDiv = document.getElementById("images");

p.images.forEach((img,i)=>{
  let el = document.createElement("img");
  el.src = img;

  if(i==0) el.classList.add("active");

  el.onclick = function(){
    mainImg.src = img;

    document.querySelectorAll(".images img").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
  }

  imagesDiv.appendChild(el);
});

// إضافة للسلة
function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let qty = document.getElementById("qty").value;

  cart.push({...p, qty});
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تمت الإضافة للسلة");
}

// واتساب
function buyNow(){
  let qty = document.getElementById("qty").value;

  let msg = `أريد شراء:
${p.name}
الكمية: ${qty}
الثمن: ${p.price}`;

  window.open(`https://wa.me/212613675970?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
