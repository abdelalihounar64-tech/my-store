<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Nor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.main-image{
width:100%;
height:420px;
object-fit:cover;
border-radius:20px;
background:white;
}

.gallery{
display:flex;
gap:10px;
margin-top:10px;
overflow-x:auto;
}

.gallery img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #ddd;
}

.product-title{
font-size:38px;
font-weight:bold;
margin:20px 0;
text-align:center;
}

.price-input{
width:100%;
padding:15px;
font-size:22px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:20px;
}

.info{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.info h3{
margin-bottom:10px;
}

.counter{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:15px;
}

.counter button{
width:55px;
height:55px;
border:none;
background:black;
color:white;
font-size:28px;
border-radius:12px;
cursor:pointer;
}

.count{
font-size:35px;
font-weight:bold;
}

.cart-btn{
width:100%;
padding:18px;
background:#28a745;
color:white;
border:none;
border-radius:15px;
font-size:22px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<img
id="mainImage"
class="main-image"
src="https://i.ibb.co/bgkdP6hs/file-00000000e5c471f4b3a0e576bb4f947f.png">

<div class="gallery">

<img
src="https://i.ibb.co/bgkdP6hs/file-00000000e5c471f4b3a0e576bb4f947f.png"
onclick="changeImage(this.src)">

<img
src="https://i.ibb.co/jZR1gk7J/file-00000000f23871f489b632d89cc1bb70.png"
onclick="changeImage(this.src)">

</div>

<h1 class="product-title">
Film Nor
</h1>

<input
type="number"
class="price-input"
placeholder="الثمن (اختياري)">

<div class="info">

<h3>
عدد القطع في العلبة: 24 قطعة
</h3>

<div class="counter">

<button onclick="changeQty(-1)">-</button>

<div
id="qty"
class="count">
1
</div>

<button onclick="changeQty(1)">+</button>

</div>

</div>

<button
class="cart-btn"
onclick="addToCart()">

إضافة إلى السلة

</button>

</div>

<script>

let quantity = 1;

function changeImage(src){

document.getElementById(
"mainImage"
).src = src;

}

function changeQty(value){

quantity += value;

if(quantity < 1){
quantity = 1;
}

document.getElementById(
"qty"
).innerText = quantity;

}

function addToCart(){

const price =
document.querySelector(
".price-input"
).value || 0;

const product = {

id: Date.now(),

name: "Film Nor",

image:
"https://i.ibb.co/bgkdP6hs/file-00000000e5c471f4b3a0e576bb4f947f.png",

price: Number(price),

unit: "24 قطعة",

quantity: quantity

};

let cartItems =
JSON.parse(
localStorage.getItem("cartItems")
) || [];

cartItems.push(product);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

alert("تمت إضافة المنتج إلى السلة");

}

</script>

</body>
</html>
