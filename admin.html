<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}

header{
  background:black;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.save{
  background:green;
  color:white;
}

.delete{
  background:red;
  color:white;
}

.back{
  background:black;
  color:white;
}

.product{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.product img{
  width:50px;
  height:50px;
  border-radius:10px;
  object-fit:cover;
}
</style>

</head>
<body>

<header>Admin Panel 🔐</header>

<div class="container">

<input type="text" id="name" placeholder="اسم المنتج">
<input type="number" id="price" placeholder="الثمن">
<input type="number" id="box" placeholder="عدد القطع في العلبة">

<input type="file" id="images" multiple accept="image/*">

<button class="save" onclick="addProduct()">حفظ المنتج</button>
<button class="back" onclick="goHome()">رجوع</button>

<h3>المنتجات</h3>
<div id="list"></div>

</div>

<script>

// 🔐 حماية بالكود
let pass = prompt("ادخل الكود");
if(pass !== "1234"){
  alert("كود خاطئ");
  location="index.html";
}

// جلب المنتجات
let products = JSON.parse(localStorage.getItem("products")) || [];

// عرض المنتجات
function showProducts(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  // ترتيب A-Z
  products.sort((a,b)=>a.name.localeCompare(b.name));

  products.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className="product";

    div.innerHTML=`
      <img src="${p.images[0]}">
      <span>${p.name}</span>
      <button class="delete" onclick="remove(${i})">❌</button>
    `;

    list.appendChild(div);
  });
}

// حذف منتج
function remove(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  showProducts();
}

// إضافة منتج
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let box = document.getElementById("box").value;
  let files = document.getElementById("images").files;

  if(!name || files.length === 0){
    alert("دخل الاسم والصور");
    return;
  }

  let images = [];
  let loaded = 0;

  for(let i=0;i<files.length && i<5;i++){
    let reader = new FileReader();

    reader.onload = function(e){
      images.push(e.target.result);
      loaded++;

      if(loaded === Math.min(files.length,5)){
        let product = {
          name:name,
          price:price,
          box:box,
          images:images
        };

        products.push(product);
        localStorage.setItem("products",JSON.stringify(products));

        alert("تمت الإضافة");

        document.getElementById("name").value="";
        document.getElementById("price").value="";
        document.getElementById("box").value="";
        document.getElementById("images").value="";

        showProducts();
      }
    };

    reader.readAsDataURL(files[i]);
  }
}

// رجوع
function goHome(){
  location="index.html";
}

// أول تحميل
showProducts();

</script>

</body>
</html>
