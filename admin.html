<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{font-family:Arial; padding:20px; background:#f2f2f2;}
input{display:block; margin:10px 0; padding:10px; width:100%;}
button{padding:10px; margin:5px;}
.card{background:white; padding:10px; margin:10px 0;}
img{width:100px;}
</style>
</head>

<body>

<h2>Admin Panel 🔧</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="box" placeholder="عدد القطع فالعلبة (مثلا 16)">
<input id="img" placeholder="رابط الصورة">

<button onclick="add()">➕ إضافة</button>

<hr>

<div id="list"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function show(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <button onclick="del(${p.id})">❌ حذف</button>
    </div>
    `;
  });
  document.getElementById("list").innerHTML=html;
}

show();

function add(){
  let name=nameInput.value;
  let price=priceInput.value;
  let img=imgInput.value;
  let box=boxInput.value;

  if(!name || !img){
    alert("دخل الاسم والصورة");
    return;
  }

  products.push({
    id:Date.now(),
    name,
    price:price||0,
    img,
    box:parseInt(box)||1
  });

  localStorage.setItem("products",JSON.stringify(products));
  show();
}

function del(id){
  products = products.filter(p=>p.id!=id);
  localStorage.setItem("products",JSON.stringify(products));
  show();
}

</script>

</body>
</html>
