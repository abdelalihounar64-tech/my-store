<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{font-family:Arial; padding:20px; background:#f2f2f2;}
input{width:100%; padding:10px; margin:5px 0;}
button{padding:10px; margin-top:10px;}
.card{background:white; padding:10px; margin:10px 0; border-radius:10px;}
img{width:80px;}
</style>
</head>

<body>

<h2>لوحة التحكم 🔧</h2>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="الثمن">
<input id="box" placeholder="عدد القطع في العلبة (مثلا 16)">
<input id="img" placeholder="رابط الصورة">

<button onclick="add()">➕ إضافة</button>

<hr>

<div id="list"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function show(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'">
      <h3>${p.name}</h3>
      <button onclick="del(${p.id})">❌ حذف</button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

function add(){
  let name=document.getElementById("name").value.trim();
  let price=document.getElementById("price").value.trim();
  let img=document.getElementById("img").value.trim();
  let box=document.getElementById("box").value.trim();

  if(!name || !img){
    alert("دخل الاسم والصورة");
    return;
  }

  products.push({
    id:Date.now(),
    name,
    price:price||0,
    img,
    box:parseInt(box)||1
  });

  localStorage.setItem("products",JSON.stringify(products));
  show();
}

function del(id){
  products = products.filter(p=>p.id!=id);
  localStorage.setItem("products",JSON.stringify(products));
  show();
}

show();
</script>

</body>
</html>
