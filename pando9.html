<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pando</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
}

.main-image{
width:100%;
border-radius:20px;
background:white;
cursor:pointer;
transition:.3s;
border:3px solid transparent;
}

.main-image.active{
border:3px solid #000;
}

.thumbnails{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:15px;
padding-bottom:5px;
}

.thumbnails img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #ddd;
background:white;
flex-shrink:0;
}

.thumbnails img.active{
border:3px solid #000;
}

.video-wrapper{
position:relative;
width:90px;
height:90px;
flex-shrink:0;
}

.thumbnails video{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
cursor:pointer;
border:2px solid #ddd;
background:black;
}

.thumbnails video.active{
border:3px solid #000;
}

/* أيقونة Play */
.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:35px;
height:35px;
background:rgba(0,0,0,0.7);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
}

.play-icon::after{
content:'';
border-left:12px solid white;
border-top:8px solid transparent;
border-bottom:8px solid transparent;
margin-left:3px;
}

.product-title{
font-size:38px;
font-weight:bold;
margin-top:25px;
margin-bottom:20px;
}

.price-input{
width:100%;
padding:18px;
font-size:22px;
border:1px solid #ccc;
border-radius:18px;
outline:none;
margin-bottom:20px;
text-align:right;
}

select{
width:100%;
padding:18px;
font-size:22px;
border-radius:18px;
border:1px solid #ccc;
margin-bottom:25px;
}

.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:35px;
margin-bottom:25px;
}

.qty-box button{
width:80px;
height:80px;
font-size:35px;
border:none;
border-radius:20px;
background:#000;
color:white;
cursor:pointer;
}

#quantity{
font-size:50px;
font-weight:bold;
min-width:100px;
text-align:center;
}

.cart-btn{
width:100%;
padding:18px;
font-size:24px;
background:black;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.description{
margin-top:25px;
background:white;
padding:20px;
border-radius:20px;
line-height:1.8;
font-size:18px;
}

/* ديزاين الرسالة الجديدة */
.custom-alert{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:30px 25px;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
text-align:center;
z-index:9999;
transition:all 0.3s;
min-width:280px;
}

.custom-alert.show{
transform:translate(-50%,-50%) scale(1);
}

.custom-alert p{
font-size:20px;
margin-bottom:20px;
color:#333;
}

.custom-alert button{
background:black;
color:white;
border:none;
padding:12px 40px;
border-radius:15px;
font-size:18px;
cursor:pointer;
}

.alert-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:9998;
display:none;
}

</style>

</head>

<body>

<div class="container">

<img
id="mainImage"
class="main-image active"
src="https://i.ibb.co/SDGv6jvV/file-000004e2c720ab1fe9ae4a0e6ca9a.png">

<div class="thumbnails">

<img class="thumb active" src="https://i.ibb.co/SDGv6jvV/file-000004e2c720ab1fe9ae4a0e6ca9a.png" onclick="changeImage(this.src,'image',this)">

<img class="thumb" src="https://i.ibb.co/RG8Rsn2y/file-000bac71f49dc2c4fb5ff6c28e.png" onclick="changeImage(this.src,'image',this)">

<!-- الفيديو مع أيقونة Play -->
<div class="video-wrapper">
<video class="thumb" muted playsinline poster="https://i.ibb.co/SDGv6jvV/file-000004e2c720ab1fe9ae4a0e6ca9a.png" onclick="changeImage('https://res.cloudinary.com/dxhqxicb9/video/upload/InShot_20260603_160048838_u1uko0.mp4','video',this)"></video>
<div class="play-icon"></div>
</div>

</div>

<h1 class="product-title">
Pando
</h1>

<input
type="number"
class="price-input"
placeholder="الثمن (اختياري)">

<select id="unit">

<option value="piece">
قطعة
</option>

<option value="carton">
علبة (6 قطع)
</option>

</select>

<div class="qty-box">

<button onclick="increaseQuantity()">+</button>

<span id="quantity">0</span>

<button onclick="decreaseQuantity()">-</button>

</div>

<button class="cart-btn" onclick="addToCart()">
إضافة إلى السلة
</button>

<div class="description">

ورق صحي Pando يوفر الراحة والنظافة اليومية بفضل الجودة الجيدة والملمس الناعم.

✔ ملمس ناعم ومريح

✔ امتصاص جيد وفعال

✔ مناسب للاستعمال اليومي

✔ جودة موثوقة لجميع أفراد الأسرة

✔ تصميم عملي واقتصادي

✔ يساعد على توفير النظافة والراحة

✔ مناسب للاستخدام المنزلي

العلبة تحتوي على 6 قطع.

</div>

</div>

<!-- الرسالة الجميلة -->
<div class="alert-overlay" id="overlay" onclick="closeAlert()"></div>
<div class="custom-alert" id="customAlert">
<p id="alertText"></p>
<button onclick="closeAlert()">OK</button>
</div>

<script>

let quantity = 0;

const quantityValue =
document.getElementById("quantity");

const unitSelect =
document.getElementById("unit");

function changeImage(src,type,el){
document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
document.getElementById('mainImage').classList.remove('active');
if(el.classList.contains('video-wrapper')) el.querySelector('video').classList.add('active');
else el.classList.add('active');

const mainImage = document.getElementById("mainImage");
if(type === 'video'){
mainImage.outerHTML = `<video id="mainImage" class="main-image active" src="${src}" controls autoplay muted playsinline poster="${el.poster || src}"></video>`;
}else{
if(mainImage.tagName === 'VIDEO'){
mainImage.outerHTML = `<img id="mainImage" class="main-image active" src="${src}">`;
}else{
mainImage.src = src;
mainImage.classList.add('active');
}
}

// بدل الصورة الصغيرة حتى هي
const mainThumb = document.querySelector('.thumbnails .thumb.active');
if(mainThumb && type === 'image'){
mainThumb.src = src;
}
}

document.addEventListener("click",function(e){
if(e.target.id === "mainImage" && e.target.tagName === "IMG"){
if(e.target.style.transform==="scale(2)"){
e.target.style.transform="scale(1)";
}else{
e.target.style.transform="scale(2)";
}
}); // سديت القوس هنا

function increaseQuantity(){

const step =
unitSelect.value === "carton"
? 6
: 1;

quantity += step;

quantityValue.textContent =
quantity;

}

function decreaseQuantity(){

const step =
unitSelect.value === "carton"
? 6
: 1;

quantity -= step;

if(quantity < 0){
quantity = 0;
}

quantityValue.textContent =
quantity;

}

unitSelect.addEventListener(
"change",
()=>{

quantity = 0;

quantityValue.textContent =
quantity;

});

// دالة الرسالة الجديدة
function showAlert(text){
document.getElementById("alertText").textContent = text;
document.getElementById("overlay").style.display = "block";
document.getElementById("customAlert").classList.add("show");
}

function closeAlert(){
document.getElementById("overlay").style.display = "none";
document.getElementById("customAlert").classList.remove("show");
}

function addToCart(){

const price =
document.querySelector(".price-input").value || 0;

const unit =
document.getElementById("unit").value;

if(quantity <= 0){

showAlert("اختر الكمية أولاً");

return;

}

const product = {

id: Date.now(),

name: "Pando",

image:
"https://i.ibb.co/SDGv6jvV/file-000004e2c720ab1fe9ae4a0e6ca9a.png",

price: Number(price),

unit:
unit === "piece"
? "قطعة"
: "علبة",

quantity: quantity

};

let cartItems =
JSON.parse(
localStorage.getItem("cartItems")
) || [];

cartItems.push(product);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

showAlert("تمت إضافة المنتج إلى السلة");

}

</script>

</body>

</html>
