<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج - Mostafa Clean Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');

    * {
    font-family: 'Cairo', sans-serif;
  }

  body {
    background: #f8fafc;
  }

 .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }

 .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

 .main-image {
    transition: transform 0.3s ease;
  }

 .main-image:hover {
    transform: scale(1.02);
  }

 .thumbnail {
    transition: all 0.2s ease;
  }

 .thumbnail:hover {
    transform: scale(1.05);
    border-color: #10b981;
  }

 .thumbnail.active {
    border: 2px solid #10b981;
  }

 .btn-scale {
    transition: all 0.2s ease;
  }

 .btn-scale:hover {
    transform: scale(1.05);
  }

 .btn-scale:active {
    transform: scale(0.98);
  }

 .soft-shadow {
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  }

 .soft-shadow-lg {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  }
</style>
</head>
<body class="pb-28">

  <!-- Top Action Bar -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-40 soft-shadow">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 transition">
          <i class="fa-solid fa-arrow-right text-xl text-gray-700"></i>
        </button>
        <div class="flex items-center gap-2">
          <button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 transition">
            <i class="fa-solid fa-share-nodes text-xl text-gray-700"></i>
          </button>
          <button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 transition">
            <i class="fa-regular fa-heart text-xl text-gray-700"></i>
          </button>
          <button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 transition relative">
            <i class="fa-solid fa-cart-shopping text-xl text-gray-700"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid lg:grid-cols-2 gap-6 lg:gap-8">

      <!-- Image Gallery -->
      <div>
        <div class="bg-white rounded-2xl soft-shadow-lg p-4 mb-4">
          <div class="relative aspect-square bg-gray-50 rounded-xl overflow-hidden mb-4">
            <img
              id="mainImage"
              class="main-image w-full h-full object-cover cursor-pointer"
              src="https://i.ibb.co/zWQstnsd/Screenshot-2026-06-06-14-35-32-390-edit-com-miui-gallery.jpg">
          </div>

          <div class="thumbnails flex gap-3 overflow-x-auto scrollbar-hide">
            <img src="https://i.ibb.co/zWQstnsd/Screenshot-2026-06-06-14-35-32-390-edit-com-miui-gallery.jpg" onclick="changeImage(this.src)" class="thumbnail w-20 h-20 md:w-24 md:h-24 object-cover rounded-xl cursor-pointer border-2 border-gray-200 bg-white flex-shrink-0">
            <img src="https://i.ibb.co/zV3T98zC/Screenshot-2026-06-06-14-35-50-383-edit-com-miui-gallery.jpg" onclick="changeImage(this.src)" class="thumbnail w-20 h-20 md:w-24 md:h-24 object-cover rounded-xl cursor-pointer border-2 border-gray-200 bg-white flex-shrink-0">
            <img src="https://i.ibb.co/Xr3Nsp8P/Screenshot-2026-06-06-14-35-59-443-edit-com-miui-gallery.jpg" onclick="changeImage(this.src)" class="thumbnail w-20 h-20 md:w-24 md:h-24 object-cover rounded-xl cursor-pointer border-2 border-gray-200 bg-white flex-shrink-0">
          </div>
        </div>
      </div>

      <!-- Product Info -->
      <div class="space-y-5">
        <div class="bg-white rounded-2xl soft-shadow-lg p-6">
          <!-- Status Badge -->
          <div class="flex items-start justify-between mb-3">
            <span class="px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">متوفر</span>
          </div>

          <!-- Title -->
          <h1 class="product-title text-3xl md:text-4xl font-bold text-gray-900 mb-4">
            Chapo
          </h1>

          <!-- Price Input -->
          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-600 mb-2">الثمن (درهم)</label>
            <input
              type="number"
              class="price-input w-full px-5 py-4 text-2xl font-bold border-2 border-gray-200 rounded-xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition text-right"
              placeholder="0.00">
          </div>

          <!-- Unit Select -->
          <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-600 mb-2">الوحدة</label>
            <select id="unit" class="w-full px-5 py-4 text-lg font-semibold border-2 border-gray-200 rounded-xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition bg-white">
              <option value="piece">قطعة</option>
              <option value="carton">علبة (12 قطعة)</option>
            </select>
          </div>

          <!-- Quantity Box -->
          <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-600 mb-3 text-center">الكمية</label>
            <div class="qty-box flex justify-center items-center gap-6">
              <button onclick="decreaseQuantity()" class="btn-scale w-16 h-16 md:w-20 md:h-20 text-3xl md:text-4xl border-none rounded-2xl bg-gray-900 hover:bg-black text-white cursor-pointer soft-shadow">
                -
              </button>
              <span id="quantity" class="text-5xl md:text-6xl font-bold text-gray-900 min-w-[100px] text-center">0</span>
              <button onclick="increaseQuantity()" class="btn-scale w-16 h-16 md:w-20 md:h-20 text-3xl md:text-4xl border-none rounded-2xl bg-gray-900 hover:bg-black text-white cursor-pointer soft-shadow">
                +
              </button>
            </div>
          </div>

          <!-- Add to Cart Button -->
          <button class="cart-btn w-full py-5 text-xl font-bold bg-emerald-600 hover:bg-emerald-700 text-white border-none rounded-xl cursor-pointer btn-scale soft-shadow-lg flex items-center justify-center gap-3" onclick="addToCart()">
            <i class="fa-solid fa-cart-plus"></i>
            إضافة إلى السلة
          </button>
        </div>

        <!-- Description -->
        <div class="description bg-white rounded-2xl soft-shadow-lg p-6">
          <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-align-right text-emerald-600"></i>
            وصف المنتج
          </h2>
          <div class="text-gray-700 leading-relaxed text-lg space-y-2">
            <p>منتج Chapo عالي الجودة.</p>
            <p>مناسب للاستعمال اليومي ويتميز بجودة ممتازة.</p>
            <p>العلبة تحتوي على 12 قطعة.</p>
          </div>
        </div>

        <!-- Features -->
        <div class="bg-white rounded-2xl soft-shadow-lg p-6">
          <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-star text-emerald-600"></i>
            المميزات
          </h2>
          <div class="grid grid-cols-2 gap-3">
            <div class="flex items-center gap-3 bg-emerald-50 rounded-xl p-4">
              <div class="w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-medal text-emerald-600 text-xl"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">جودة عالية</span>
            </div>
            <div class="flex items-center gap-3 bg-emerald-50 rounded-xl p-4">
              <div class="w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-shield-halved text-emerald-600 text-xl"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">أصلي 100%</span>
            </div>
            <div class="flex items-center gap-3 bg-emerald-50 rounded-xl p-4">
              <div class="w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-bolt text-emerald-600 text-xl"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">سريع المفعول</span>
            </div>
            <div class="flex items-center gap-3 bg-emerald-50 rounded-xl p-4">
              <div class="w-12 h-12 bg-emerald-100 rounded-lg flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-hand-holding-dollar text-emerald-600 text-xl"></i>
              </div>
              <span class="text-sm font-semibold text-gray-700">اقتصادي</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sticky Bottom Bar -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 soft-shadow-lg z-40 p-4">
    <div class="max-w-7xl mx-auto flex items-center gap-3">
      <button class="w-14 h-14 bg-gray-100 hover:bg-gray-200 rounded-xl flex items-center justify-center transition btn-scale">
        <i class="fa-solid fa-share-nodes text-xl text-gray-700"></i>
      </button>
      <button class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold text-lg transition shadow-md btn-scale flex items-center justify-center gap-3" onclick="addToCart()">
        <i class="fa-solid fa-cart-plus"></i>
        <span>إضافة إلى السلة</span>
      </button>
      <button class="w-14 h-14 bg-gray-100 hover:bg-gray-200 rounded-xl flex items-center justify-center transition btn-scale">
        <i class="fa-regular fa-heart text-xl text-gray-700"></i>
      </button>
    </div>
  </div>

<script>

function changeImage(src){
document.getElementById("mainImage").src = src;
}

document.getElementById("mainImage")
.addEventListener("click",function(){

if(this.style.transform==="scale(2)"){
this.style.transform="scale(1)";
}else{
this.style.transform="scale(2)";
}

});

let quantity = 0;

const quantityValue =
document.getElementById("quantity");

const unitSelect =
document.getElementById("unit");

function increaseQuantity(){

const step =
unitSelect.value === "carton"
? 12
: 1;

quantity += step;

quantityValue.textContent =
quantity;

}

function decreaseQuantity(){

const step =
unitSelect.value === "carton"
? 12
: 1;

quantity -= step;

if(quantity < 0){
quantity = 0;
}

quantityValue.textContent =
quantity;

}

unitSelect.addEventListener(
"change",
()=>{

quantity = 0;

quantityValue.textContent =
quantity;

});

function addToCart(){

const price =
document.querySelector(".price-input").value || 0;

const unit =
document.getElementById("unit").value;

if(quantity <= 0){

alert("اختر الكمية أولاً");

return;

}

const product = {

id: Date.now(),

name: "Chapo",

image:
"https://i.ibb.co/zWQstnsd/Screenshot-2026-06-06-14-35-32-390-edit-com-miui-gallery.jpg",

price: Number(price),

unit:
unit === "piece"
? "قطعة"
: "علبة",

quantity: quantity

};

let cartItems =
JSON.parse(
localStorage.getItem("cartItems")
) || [];

cartItems.push(product);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

alert("تمت إضافة المنتج إلى السلة");

}

</script>
</body>
</html>
